    підняти щит. Срібло і святе сонячне світло — єдине, що реально шкодить упирю. Після загибелі він розсипається на попіл,
    залишаючи лише свій одяг.'
  lore_en: 'Vampires are ancient evildoers who sold their souls for immortality. They retain human intelligence and even human
    appearance but require the blood of the living to maintain their power. A vampire is patient and cunning — it may wait
    years for the right moment. In combat it is blindingly fast: capable of leaping ten meters and reaching a throat before
    a shield can be raised. Silver and holy sunlight are the only reliable weapons. Upon death it crumbles to ash, leaving
    only its clothing.'
