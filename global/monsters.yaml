- id: monster_skeleton_warrior
  name: Скелет-ратник
  type: undead
  description: Оживлений кістяк в іржавих доспіхах. Безмовний, невтомний, не відчуває болю.
  full_description: Колись живий воїн, тепер лише кістяк, що рухається волею некроманта або давнього прокляття. Скелети-ратники
    нічого не пам'ятають зі свого попереднього життя — вони лише виконують накази або бродять у пошуках живих. Вони не відчувають
    утоми, голоду чи страху, але не мають і тактичної гнучкості живих бійців. Удар по суглобах або голові — найефективніший
    спосіб знешкодити скелет. Одяг і зброя на них — рештки реального бійця, що відійшов у минуле.
  lore_en: Once a living warrior, now merely bones animated by a necromancer's will or an ancient curse. Skeleton warriors
    retain nothing of their former lives — they simply execute commands or wander seeking the living. They feel no fatigue,
    hunger, or fear, but lack the tactical flexibility of living soldiers. Strikes to joints or the skull are most effective.
    The armor and weapons they carry are remnants of whoever they once were — perhaps centuries ago.
