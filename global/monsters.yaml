    silent and slow, but their touch freezes the water in a victim's blood. A single touch paralyzes for several seconds —
    enough time to deliver a killing blow. Temperature drops below freezing in their presence; even plate-armored knights
    begin to shiver. Fire does not stop them — they simply absorb the heat and grow larger. Only magical fire or physical
    blunt trauma can truly damage them.
