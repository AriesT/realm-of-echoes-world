    wings and a venomous tail stinger, they compensate for lack of power with cunning and spite. An imp rarely attacks openly
    — it waits for the target to be distracted, stings with its venom, and flees. Their laughter — thin and piercing — is
    said to cause madness over time. They serve witches and dark mages as familiars. Destroying a familiar inflicts pain on
    its master.
