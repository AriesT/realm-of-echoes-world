- id: monster_giant_spider
  name: Гігантський Павук
  type: beast
  description: Велетенський павук з темних печер. Плете міцні тенета і паралізує жертву отрутою.
  full_description: Гігантські павуки — кошмар підземель та сирих лісів. Їхні тенета вирізняються неймовірною міцністю — навіть
    меч не одразу їх розрубає. Отрута павука не вбиває миттєво, але паралізує м'язи і викликає жахіття — жертва лежить непорушно
    й спостерігає, як павук загортає її у шовк. Ловці пригод шукають їхні гнізда заради дорогоцінного павутиння — матеріалу
    для виготовлення легкої, але надзвичайно міцної броні. Невбиті павуки запам'ятовують запах мисливця і можуть переслідувати
    його роками.
  lore_en: Giant spiders lurk in damp caves and dark forest hollows, spinning webs of incredible tensile strength. Their venom
    does not kill outright but paralyzes muscles, leaving victims conscious but helpless as the spider wraps them in silk.
    Adventurers hunt their nests for spider silk — a prized material for lightweight armor. A surviving spider is said to
    remember a hunter's scent for years, biding its time for revenge.
