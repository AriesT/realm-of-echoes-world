- id: monster_bandit
  name: Бандит
  type: humanoid
  description: Озброєний дезертир або злочинець. Грабує мандрівників на самотніх дорогах.
  full_description: Бандити з'являються там, де закон слабкий — на гірських перевалах, лісових стежках та відлюдних трактах.
    Більшість з них колишні солдати, злочинці або збіднілі селяни, що обрали злочин замість голодної смерті. Одиночний бандит
    — ще не найстрашніше. Небезпечні їхні зграї з десятків осіб, які контролюють цілі регіони. Деякі банди мають власні кодекси
    честі, інші — нелюди без жалю. Гаманець бандита зазвичай містить мішанину монет від десятків ограбованих мандрівників.
  lore_en: Bandits emerge wherever law is weak — mountain passes, forest trails, and lonely roads far from town guards. Most
    are former soldiers, convicted criminals, or destitute peasants who chose crime over starvation. A lone bandit is manageable;
    their gangs controlling entire regions are true threats. Some bands follow their own codes of honor, others are merciless
    killers. A bandit's coin pouch typically holds a mix of coins from dozens of robbed travelers.
