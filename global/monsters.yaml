- id: monster_wolf
  name: Вовк
  type: beast
  description: Хижак лісових хащ. Полює зграями, відрізняється витривалістю та нюхом.
  full_description: 'Сірий лісовий вовк — один з найпоширеніших хижаків у Луннійських лісах. Поодинці не надто небезпечний,
    проте зграя вовків може легко здолати навіть досвідченого мандрівника. Вовки чудово орієнтуються вночі, тому особливо
    небезпечні після настання темряви. Місцеві мисливці кажуть: почув виття — розпали вогонь і не рухайся. Шкура вовка цінується
    шевцями й кравцями, а ікло вважається символом хоробрості у деяких племенах.'
  lore_en: A grey forest wolf, one of the most common predators in the Lunniy woodlands. Alone it is manageable, but wolf
    packs are notorious for overwhelming even seasoned travelers. They have exceptional night vision and keen smell that can
    track prey across miles of forest. Their pelts are prized by leather workers, and their fangs are worn as trophies by
    hunters who survived an encounter.
