- id: monster_zombie
  name: Зомбі
  type: undead
  description: Повільне, але невпинне мерцяче тіло. Заражає укусом.
  full_description: 'Зомбі — найпримітивніша форма нежиті: тіло без розуму, що рухається лише жагою до живої плоті. Вони повільні,
    але невпинні. Укус зомбі може інфікувати навіть через броню, якщо укус достатньо сильний, і без лікування вакцинальна
    лихоманка зведе бійця до могили за три дні. Небезпечні в натовпі — навіть досвідчений воїн може бути подавлений чисельністю.
    Їх уражає вогонь: горить жирна плоть надзвичайно охоче. Запах тліну відчувається за сотні метрів — корисний попереджувальний
    знак.'
  lore_en: 'Zombies are the most primitive form of undead: a body without a mind, driven only by a hunger for living flesh.
    They are slow but relentless. A zombie''s bite can infect through armor if strong enough; without treatment, the resulting
    fever kills within three days. Dangerous in numbers — even a skilled warrior can be overwhelmed by sheer volume of rotting
    bodies. Fire works excellently against them. The stench of decay travels hundreds of meters — a useful early warning.'
