  full_description: 'Кам''яний голем — магічний конструкт, створений стародавніми чарівниками для охорони скарбниць та важливих
    місць. Голем не має свідомості — він просто виконує останній наказ свого творця, навіть якщо той давно помер. Фізична
    сила голема неймовірна: удар його кам''яного кулака пробиває кам''яну стіну. Зброя ковзає по гладкому каменю, не залишаючи
    подряпин. Ефективні лише заклинання, що руйнують каміння, або атаки в магічні руни, вирізьблені на його тілі — саме вони
