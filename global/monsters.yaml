- id: monster_lich
  name: Ліч
  type: undead
  description: Некромант-філіч, що досяг безсмертя через ритуал. Повелитель мертвих.
  full_description: 'Ліч — те, чим стає великий некромант після жахливого ритуалу філактерії: він поміщає свою душу в магічний
    артефакт і продовжує існувати навіть після знищення тіла, доки артефакт цілий. Ліч — одна з найнебезпечніших істот у відомому
    світі. Він накопичував знання тисячоліттями і часто знає магічні заклинання, забуті всіма живими. Його ненависть до живих
    абсолютна. Армії нежиті коряться його волі. Без знищення філактерії ліч відродиться через сім днів після загибелі.'
  lore_en: 'A lich is what a great necromancer becomes after a terrible phylactery ritual: he places his soul in a magical
    artifact and continues existing even after his body is destroyed, as long as the artifact remains intact. A lich is among
    the most dangerous beings in the known world, having accumulated magical knowledge over millennia — often knowing spells
    forgotten by all living mages. His hatred of the living is absolute. Armies of undead obey his will. Without destroying
    the phylactery, a lich returns seven days after apparent death.'
