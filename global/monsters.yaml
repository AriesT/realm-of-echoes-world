- id: monster_goblin_scout
  name: Гоблін-розвідник
  type: humanoid
  description: Дрібний гоблін зі шкіряною броньою та іржавим кинджалом. Полює поодинці.
  full_description: Гобліни-розвідники — перший ешелон набігів гоблінських зграй. Маленькі, швидкі та боягузливі, вони тікають
    при найменшій загрозі, проте вміло використовують засідки й пастки. Розвідник ніколи не нападе першим, якщо бачить реальну
    загрозу — спочатку збере інформацію й покличе підкріплення. Їхні кинджали зазвичай іржаві, а броня пошита з чого попало,
    але чисельністю вони компенсують слабкість кожного окремого бійця. Вухо гобліна вважається доказом виконання завдання
    по зачистці стежок.
  lore_en: Goblin scouts are the first wave of goblin raiding parties — small, fast, and cowardly. They flee at the first
    sign of real danger but are expert at ambushes and crude traps. A scout will never attack until it has gathered enough
    information or called for backup. Their rusty daggers and mismatched armor make them easy pickings one-on-one, but they
    rarely travel alone for long. A goblin ear is proof of a path-clearing job completed.
