- id: monster_thornwalker
  name: Тернистий Страж
  type: plant
  description: Деревоподібна рослина, що рухається. Сповита шипами, захищає ліс.
  full_description: 'Тернисті стражі — ожилі дерева або великі рослини, пронизані природньою магією. Вони захищають ліс від
    тих, хто несе йому шкоду: лісорубів, підпалювачів, мисливців. Рослину збуджує запах диму або звук рубання дерев — тоді
    вона оживає і нападає. Тернистий страж не ганяється за жертвою — він просто не дає тій втекти, обплутуючи ліани навколо
    ніг і засипаючи хмарою отруйних шипів. Вогонь — єдина реальна загроза для нього, але підпал лісу зустрінуть усі стражі
    одразу.'
  lore_en: 'Thornwalkers are animated trees or large plants infused with natural magic. They protect the forest from those
    who harm it: loggers, arsonists, poachers. The plant awakens at the smell of smoke or the sound of tree-chopping, then
    moves to attack. A thornwalker does not chase its victim — it simply prevents escape by entangling vines around the legs
    and releasing clouds of poisonous thorns. Fire is the only real threat to a thornwalker, but setting the forest alight
    will draw all guardians at once.'
  strength: 17
