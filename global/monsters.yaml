- id: monster_bandit_captain
  name: Отаман розбійників
  type: humanoid
  description: Досвідчений ватажок банди. Б'ється жорстоко і вміло, не відступає.
  full_description: Отаман — той, хто пережив достатньо бійок, щоб підкорити собі інших. Він не просто хоробрий — він хитрий,
    безжалісний і прагматичний. Отаман завжди б'ється востаннє, коли втеча вже неможлива, і навіть тоді може спробувати підкупити
    або обдурити противника. Його зброя — якісна, куплена або вкрадена у багатих купців. Загибель отамана зазвичай розвалює
    банду — інші розбігаються або розпочинають кривавий переділ влади.
  lore_en: The bandit captain is someone who survived enough fights to dominate others. Not merely brave — cunning, ruthless,
    and pragmatic. He fights last when retreat is impossible, and even then may attempt to bribe or deceive opponents. His
    equipment is quality — bought or stolen from wealthy merchants. His death typically dissolves the gang, as others scatter
    or start a bloody power struggle. A captain's personal effects are often worth more than simple coin.
