  full_description: Тіньові демони — жахи, народжені з накопиченого людського страху. Вони не мають фізичного тіла — лише
    тьмяне мерехтіння в темряві та відчуття холоду в грудях. Тільки на прямому світлі вони набувають напівпрозорої форми,
