  lore_en: 'A stone golem is a magical construct created by ancient sorcerers to guard treasuries and important locations.
    The golem has no consciousness — it simply executes its last given command, even if its creator died centuries ago. Its
    physical strength is extraordinary: a single punch from its stone fist breaks through stone walls. Conventional weapons
    slide off its smooth surface. Only stone-breaking spells or attacks aimed at the magical runes carved on its body — which
    give it life — are truly effective.'
