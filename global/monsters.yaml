    з кажанячими крилами й отруйним жалом на хвості, вони надолужують нестачу сили хитрістю й підлістю. Імп рідко нападає
    у відкриту — він чекає, поки жертва відволічеться, вжалює отрутою і відлітає. Їхній сміх — тонкий, пронизливий — здатний
