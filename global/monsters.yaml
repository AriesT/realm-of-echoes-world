  lore_en: 'Iron guardians are creations of a long-dead civilization that knew the secret of animating metal. Unlike golems,
    they are composed of mechanical parts moving in fluid, lifelike coordination. Each guardian is unique — the ancient craftsmen
    never made two alike. Some are equipped with built-in weapons: blades that grow directly from their forearms. They corrode
    with time yet continue their duty despite grinding gears and weakened joints. Metal harvested from a destroyed guardian
    is worth a small fortune to the right smith.'
