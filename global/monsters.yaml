- id: monster_grizzly_bear
  name: Ведмідь-шатун
  type: beast
  description: Величезний ведмідь, що вийшов із зимової сплячки злим і голодним.
  full_description: Шатун — ведмідь, якому не вдалося залягти в зимову сплячку або якого розбудили. Голодний і роздратований,
    він значно агресивніший за звичайного ведмедя. Його нюх вловлює запах їжі за декілька кілометрів, а удар лапою здатний
    зламати кістки через металеву броню. Місцеві мисливці вважають зустріч із шатуном поганим знаком — навіть ті, хто вижив,
    довго потім не можуть спати. Шкура шатуна особливо цінна — густа зимова підшерстя робить її ідеальним матеріалом для теплого
    плаща чи ковдри.
  lore_en: The sleepless bear is a grizzly that failed to hibernate or was forcibly awakened. Starving and furious, it is
    far more dangerous than its hibernating kin. A single swipe of its paw can shatter bones through steel armor. Its nose
    can detect food from miles away. Hunters in the region consider encountering one a terrible omen. The bear's thick winter
    coat is prized for crafting warm traveling cloaks and heavy leather armor.
