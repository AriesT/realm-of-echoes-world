- id: monster_young_dragon
  name: Молодий Дракон
  type: dragon
  description: Ще не дорослий дракон, але вже смертоносний. Вогонь, кігті, лускова броня.
  full_description: 'Молодий дракон — близько ста років від роду, тобто дитина за мірками свого виду. І все ж він у десятки
    разів небезпечніший за людського воїна. Його вогонь уже достатньо гарячий, щоб розплавити залізо, а кігті легко розрізають
    звичайну броню. Молоді дракони надзвичайно допитливі й жадібні — вони збирають блискючі предмети та захищають своє лігво
    фанатично. Важливо знати: якщо дракон ще не виріс, його мати, ймовірно, поруч. Дракон, що досяг зрілості, стає свідомою
    надзвичайно небезпечною та розумною істотою.'
  lore_en: 'A young dragon — roughly a century old — is a child by its kind''s standards. Yet it is already dozens of times
    more dangerous than a human warrior. Its flame is hot enough to melt iron, and its claws shred conventional armor with
    ease. Young dragons are intensely curious and greedy, gathering shiny objects and defending their lair with fanatical
    intensity. A critical note: if a dragon has not yet matured, its mother is likely nearby. A fully grown dragon becomes
    an extraordinarily dangerous, intelligent and conscious being capable of speech and complex scheming.'
