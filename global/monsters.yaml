- id: monster_tusked_boar
  name: Кабан-ікластий
  type: beast
  description: Масивний дикий кабан з пожовклими іклами. Небезпечний у стані агресії.
  full_description: Ікластий кабан — гроза сільських околиць і лісових стежок. Зовні незграбний, він може розвинути небувалу
    швидкість на короткій дистанції, нанизуючи ворогів на свої жовті ікла. Самці особливо агресивні навесні під час шлюбного
    сезону. Шкіра кабана настільки товста, що звичайні стріли не пробивають її з першого пострілу. Мисливці на кабанів завжди
    беруть з собою списи — єдину надійну зброю проти розлюченого звіра. М'ясо кабана смачне, але добути його нелегко.
  lore_en: The tusked boar is a fearsome beast found at forest edges and muddy riverbanks. Despite its bulk, it can charge
    with terrifying speed. Its yellowed tusks can disembowel a man in seconds. The hide is thick enough to deflect poorly-aimed
    arrows. Male boars are especially aggressive during mating season. Experienced hunters always use spears — the only reliable
    weapon against a charging boar. The meat, once obtained, is considered a fine feast.
