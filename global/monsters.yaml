- id: monster_goblin_shaman
  name: Гоблін-шаман
  type: humanoid
  description: Жилавий гоблін у кістяних прикрасах. Викликає духів і шпурляє прокляття.
  full_description: Шамани займають особливе місце у гоблінській ієрархії. Вони не воюють самі, але їхні закляття роблять
    орду вдвічі небезпечнішою. Шаман може послабити ворога прокляттям, покликати духів хаосу або загоїти пораненого союзника.
    Їх знайти нелегко — вони ховаються за лавами рядових бійців. Знищення шамана в бою зазвичай викликає паніку в рядах гоблінів,
    бо вони вірять, що без шамана духи обернуться проти них. Кістяні амулети шаманів цінуються алхіміками як інгредієнти для
    зіль.
  lore_en: Goblin shamans hold special status in goblin society. They do not fight directly but their curses and spirit-calls
    make the horde twice as dangerous. A shaman can weaken enemies with hexes, summon chaos spirits, or mend wounded allies.
    They hide behind frontline fighters. Killing a shaman often triggers a panic among goblin troops, as they believe the
    spirits will turn against them without their caller. Their bone amulets are prized ingredients for alchemists.
