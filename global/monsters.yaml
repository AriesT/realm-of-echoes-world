    weapons pass through them, emerging charred on the other side. Only magical weapons or enchanted-cold steel are effective.
    An elemental constantly moves, leaving scorched strips of grass and melted stone footprints. Attempting to converse with
    them is futile — they have no language, only impulses, fury, and an eternal hunger to burn. Water is their true weakness.
