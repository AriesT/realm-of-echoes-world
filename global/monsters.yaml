- id: monster_orc_berserker
  name: Орк-берсерк
  type: humanoid
  description: Масивний орк у стані бойового трансу. Ігнорує біль і б'ється до останнього.
  full_description: Берсерки — елітні воїни орків, що навчаються входити в стан бойового шаленства. У такому стані вони не
    відчувають болю, не знають страху і продовжують битися навіть зі смертельними ранами. Зупинити берсерка важко — звичайні
    заклики до здачі марні. Орки шанують берсерків як втілення духу бою, хоча ті й небезпечні для своїх у разі виходу трансу
    з-під контролю. Після бою берсерки нерідко впадають у глибокий сон на добу.
  lore_en: Berserkers are elite orc warriors trained to enter a battle trance. In this state they feel no pain, know no fear,
    and continue fighting through mortal wounds. Stopping one is extraordinarily difficult — conventional calls to surrender
    are useless. Orcs revere berserkers as embodiments of the war spirit, though they are dangerous to allies if the trance
    slips from control. After battle, berserkers often fall into deep sleep for an entire day.
