- id: quest_prove_loyalty
  title: Доведи вірність
  description: Стражники Стальхейму перевіряють новачків — доведіть свою відданість.
  lore_text: 'Стальхейм не приймає чужинців на слово. Тут треба заробити повагу ділом: очистити дорогу від бандитів та доставити
    важливий пакет до воротного поста. Дрібниця? Можливо. Але саме з таких справ починається справжня слава.'
  quest_type: faction
  category: combat
  difficulty: easy
  is_active: true
  required_faction_id: faction_city_stalheim
  required_faction_tier: friendly
  saga_id: null
