- id: quest_catacombs_whisper
  title: Шепіт підземель
  description: З глибин катакомб лунає давній голос, що кличе обраних.
  lore_text: Не кожен чує його. Але ті, хто чує — не можуть не йти. Голос з-під каміння, з темних тунелів під Стальхеймом,
    що існують задовго до самого міста. Там живуть речі, про які не говорять при світлі дня. Що чекає тебе на дні — скарб,
    жах чи щось гірше за смерть?
  quest_type: hidden
  category: exploration
  difficulty: legendary
  is_active: true
  is_hidden: true
  required_location_id: null
