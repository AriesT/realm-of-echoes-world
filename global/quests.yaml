- id: quest_grizzly_hunt
  title: Полювання на Гризлі
  description: Небезпечний гризлий ведмідь тероризує околиці. Тільки команда мисливців зможе його зупинити.
  lore_text: Лісоруби більше не ходять у Кленовий Бір після того, як Залізна Лапа — величезний гризлий ведмідь з пазурами,
    що рвуть броню — почав полювати там. Один мисливець не виживе. Але разом... Разом у вас є шанс. Потрібна команда хоробрих
    — і щедра нагорода вам гарантована.
  quest_type: party
  category: combat
  difficulty: hard
  is_active: true
  min_party_size: 2
  max_party_size: 5
  time_limit_hours: 48
  saga_id: null
