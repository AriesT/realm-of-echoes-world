  time_limit_hours: null
- id: quest_goblin_den
  title: Нора гобліна
  description: Слідуйте за підозрюваним у зникненні торговця до таборища гоблінів.
  lore_text: Докази вказують на гоблінів з передгір'їв — хитрих, підлих і завжди голодних до золота. Їхній табір у Кам'яній
    западині кишить розвідниками. Вам доведеться пробитися крізь них, аби дізнатися правду. Та будьте обережні — ці гобліни
    служать комусь більш небезпечному.
  quest_type: chain
  category: combat
  difficulty: hard
  is_active: true
  saga_id: saga_shadows_stalheim
  parent_quest_id: quest_missing_merchant
  chapter_number: 2
  sort_order: 2
