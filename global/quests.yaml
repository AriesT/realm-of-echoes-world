  required_faction_id: null
  required_faction_tier: null
  required_location_id: null
  is_hidden: false
  min_party_size: null
  max_party_size: null
  time_limit_hours: null
- id: quest_shadow_council
  title: Тінь в раді
  description: Викрийте зрадника в Раді торговців Стальхейму.
  lore_text: Правда виявилася страшнішою за будь-які підозри. Хтось із членів Ради торговців фінансує гоблінські банди та
    організовує викрадення конкурентів. Щоб звинуватити його публічно, вам потрібні незаперечні докази. Майстер гільдії Олдрін
    знає більше, ніж каже. Ваша репутація у Стальхеймі стане вашою зброєю — але чи вистачить її?
  quest_type: chain
  category: social
  difficulty: legendary
  is_active: true
  is_hidden: true
  saga_id: saga_shadows_stalheim
  parent_quest_id: quest_goblin_den
  chapter_number: 3
  sort_order: 3
