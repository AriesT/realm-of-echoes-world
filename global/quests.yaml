sagas:
- id: saga_shadows_stalheim
  title: Тіні Стальхейму
  description: Розпутайте змову, що загрожує найбільшому місту регіону.
  lore_text: Стальхейм — місто заліза та честі, де кожен камінь пам'ятає криваві битви. Та зараз тінь підступності повзе крізь
    його вулиці. Торговці зникають, стражники говорять пошепки, а в темних провулках чуються чужі мови. Хтось тягне нитки
    з тіні — і лише хоробра душа зможе розплутати цей клубок.
  is_active: true
  sort_order: 1
templates:
- id: quest_missing_merchant
  title: Зниклий торговець
  description: Розслідуйте зникнення Боріса Каменяра — поважного торговця Стальхейму.
  lore_text: Три дні тому Боріс Каменяр не з'явився на ринкову площу. Його крамниця замкнена, дружина в розпачі, а капітан
    стражі лише знизує плечима. Кажуть, він мав важливу зустріч у старих портових складах... Знайдіть його або хоча б дізнайтеся,
    що трапилось.
  quest_type: chain
  category: story
  difficulty: normal
  is_active: true
  saga_id: saga_shadows_stalheim
  chapter_number: 1
  sort_order: 1
  giver_npc_id: null
