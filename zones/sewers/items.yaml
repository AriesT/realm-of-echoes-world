- id: item_waterproof_boots
  name: Водонепроникні Чоботи
  description: Товсті шкіряні чоботи обробленні жиром і смолою. Не промокають навіть у каналізаційній воді.
  full_description: Ходити по коліна у каналізаційних водах без хороших чобіт — швидкий спосіб захворіти. Ці чоботи зроблені
    з товстої кабанячої шкіри і оброблені сумішшю смоли та тваринного жиру. Незручні на суші, але в підземеллі немає нічого
    кращого для ніг.
  lore_en: Wading knee-deep in sewer water without good boots is a fast way to fall sick. These boots are made from thick
    boar hide and treated with a resin-fat compound. Uncomfortable on dry land, but underground there is nothing better for
    your feet.
