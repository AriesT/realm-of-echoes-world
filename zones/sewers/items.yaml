- id: item_sewer_leather_cap
  name: Каналізаційна Шкіряна Шапка
  description: Шкіряна шапка просочена вапняком від каналізаційних вод. Захищає від крапель і ударів.
  full_description: Мисливці на щурів давно навчились оброблювати шкіру так, щоб вона не гнила у вогкому підземеллі. Ця шапка
    просочена спеціальним складом — відштовхує воду і стійка до плісняви. Дешева, практична, пахне підземеллям — але краще
    ніж нічого.
  lore_en: Rat catchers long ago learned to treat leather so it does not rot in damp underground tunnels. This cap is treated
    with a special compound — it repels water and resists mold. Cheap, practical, smells like the underground — but better
    than nothing.
  image_prompt: Photorealistic dark fantasy item illustration, cinematic MMORPG concept art, dramatic lighting. A worn leather
