- id: item_sewer_cloak
  name: Каналізаційна Накидка
  description: Накидка з вичиненої шкури гігантського щура. Водостійка і досить міцна.
  full_description: Найкращий захист у каналізації — той, що не вбирає воду. Ця накидка зшита зі шкури гігантського щура —
    груба, водостійка, з глибоким капюшоном. Ловці щурів носять їх роками, і вони справді захищають від підземної вогкості
    й дрібних укусів.
  lore_en: The best protection in the sewers is that which does not absorb water. This cloak is sewn from giant rat hide —
    coarse, waterproof, with a deep hood. Rat catchers wear them for years; they genuinely protect against underground damp
    and small bites.
