  sell_price: 15
- id: item_bioluminescent_mushroom
  name: Біолюмінесцентний Гриб
  description: Гриб що світиться в темряві слабким синьо-зеленим світлом. Їстівний, дає сили.
  full_description: У найглибших, найтемніших закутках каналізації ростуть ці незвичайні гриби. Їхнє синьо-зелене світло — єдиний природний орієнтир у кромішній пітьмі підземель. На смак — кисло-гіркі, але дають відчутний прилив сил і прояснюють голову.
  lore_en: In the deepest, lightless reaches of the sewers, these remarkable fungi cling to slick stone walls, pulsing with a cold blue-green radiance. Their glow is the only natural landmark in the pitch-black underground — both beacon and warning. The taste is sharply sour, almost medicinal, but those who choke one down speak of a sudden surge of energy and uncommon mental clarity that cuts through the damp fog of the tunnels.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG consumable item, presented as a standalone item. A small cluster of cap mushrooms with thick, moisture-swollen stems and wide, ribbed caps, their surfaces glistening with underground damp. The fungal flesh is pale grey-white, streaked with veins of vivid bioluminescent blue-green that pulse faintly outward from the stem base. Tiny droplets of sewer moisture bead across the cap surfaces, and a thin film of underground grime coats the lower stems where they were torn from stone. The blue-green glow emanates softly from within the translucent cap flesh, casting faint cool light across surrounding surfaces. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
