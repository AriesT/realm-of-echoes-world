- id: item_rusty_shiv
  name: Іржавий Шило
  description: Саморобний кинджал із ламаного металу. Іржавий, але гострий.
  full_description: Мешканці каналізації роблять зброю з того, що знаходять. Це шило — шматок ламаного ножа, загорнутий у шматки шкіри для руків'я. Ненадійне, але в темряві й таке годиться.
  lore_en: The denizens of the sewers arm themselves with whatever the tunnels provide. This shiv began as a broken blade fragment, its edge uneven and its steel long surrendered to rust; strips of waterlogged leather scraps serve as a grip, wound tight by desperate hands. Unreliable and ugly, but in total darkness even this will do.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG weapon, presented as a standalone item. A short improvised blade fashioned from a jagged fragment of broken iron, the edge ground unevenly and notched in several places. The entire metal surface is consumed by deep reddish-brown rust and orange corrosion blooms, with pitting across the flat and a dark waterline stain where it sat in sewer water. The grip is nothing more than scraps of cracked leather wound in overlapping strips and tied with a fraying cord, all discolored to a dark slick brown from moisture and grime. Displayed diagonally, full length visible. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
