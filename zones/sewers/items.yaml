- id: item_ring_of_depths
  name: Каблучка Глибин
  description: Стародавня каблучка знайдена в затопленому сховку. Випромінює слабку магію підземель.
  full_description: 'Хтось загубив цю каблучку у підземних водах багато років тому. Вона вкрита дивними рунами, які жоден
    відомий маг не може прочитати повністю. Ті, хто її носить, помічають: в темряві підземель вони бачать трохи краще і відчувають
    себе впевненіше.'
  lore_en: 'Someone lost this ring in the underground waters many years ago. It is covered in strange runes that no known
    mage can fully decipher. Those who wear it notice: in the darkness underground they see slightly better and feel more
