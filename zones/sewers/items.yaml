- id: item_rat_tail
  name: Щурячий Хвіст
  description: Довгий голий хвіст каналізаційного щура. Мисливці кажуть — смердить тижнями.
  full_description: Відрізаний хвіст каналізаційного щура — найпоширеніший трофей у темних тунелях під Кам'яною Бродею. Алхіміки використовують порошок із висушеного хвоста як компонент для зілля від щурів. Деякі крамниці беруть їх як доказ виконаної роботи й платять мідяками.
  lore_en: The stripped tail of a sewer rat — the most common trophy pulled from the tunnels beneath Stone Ford. Alchemists grind dried rat tails into components for pest-repellent salves, and certain shopkeepers accept them as crude proof of extermination work. They are worth almost nothing alone, yet in bulk they add up to something.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG item, presented as a standalone item. A severed rat tail, roughly thirty centimeters long, dried and slightly curled at the tip, with scaly skin of mottled grey-brown and a faint sheen of dried moisture. The surface is leathery and cracked near the base where it was cut, with faint ring-like scale segments running its full length. It bears the unmistakable grime of sewer origins — discoloration from damp stone and filth ground into the creases. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
  type: resource
  subtype: trophy
  rarity: common
  weight: 0.1
  stackable: true
  max_stack: 50
  sell_price: 1
- id: item_rat_fang
  name: Щурячий Ікол
  description: Гострий жовтий ікол каналізаційного щура. Непоганий компонент для амулетів.
  full_description: Жовті щурячі ікла знаходять у темних водоймах каналізації. Знахарі нанизують їх на мотузки та продають як дешеві обереги. Справжні алхіміки знають їм кращу ціну — із них виходить компонент для отруйних настоянок.
  lore_en: Yellowed fangs pried from the jaws of sewer rats, still faintly stained from the rot they fed on. Hedge witches string them on cords as cheap charms against vermin, but real alchemists know their truer value as a base component in poison tinctures. Small and unremarkable, they are worth more than they appear.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG item, presented as a standalone item. A small pair of curved rat fangs, each no longer than a fingernail, with a yellowed ivory color deepening to a brownish stain near the root. The surface is smooth but dull, marked with fine scratches and faint discoloration from years of sewer feeding. The pointed tips remain sharp despite the grime worked into the base. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
  type: resource
  subtype: trophy
  rarity: common
  weight: 0.05
  stackable: true
  max_stack: 50
  sell_price: 2
- id: item_rat_pelt_giant
  name: Шкура Гігантського Щура
  description: Товста груба шкура велетенського щура. Покрита шрамами і рубцями від сутичок.
  full_description: Гігантські щури каналізації значно більші за звичних міських гризунів. Їхня шкура товща і грубіша — витримує вологу та дрібні порізи. Вичинена шкура гігантського щура йде на дешевий захисний одяг та водостійкі чохли.
  lore_en: The hide of a giant sewer rat is nothing like the thin skin of common city vermin — it is thick, dense, and surprisingly moisture-resistant once properly tanned. Leatherworkers use it for rough protective clothing and waterproof cases, though the leather guild buys it only at a discount. The smell, they insist, never fully leaves.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG item, presented as a standalone item. A large folded pelt of coarse grey-brown fur, the hide visibly thick and dense with tightly packed guard hairs darkened at the tips from sewer moisture. The underside of the pelt is a pale, slightly waxy leather with faint watermarks and streaks of old grime along the edges. The fur is matted in places and carries subtle discoloration from underground damp, though the overall hide is intact and structurally sound. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
  type: resource
  subtype: hide
  rarity: uncommon
  weight: 0.6
  stackable: true
  max_stack: 10
  sell_price: 8
- id: item_slug_slime
  name: Слиз Равлика
  description: Густий блискучий слиз з каналізаційного равлика. Липкий і неприємний на дотик.
  full_description: Каналізаційні равлики залишають густий слизовий слід усюди, де повзуть. Алхіміки цінують цей слиз як основу для змащувальних речовин та деяких зілль від опіків. Збирати його треба в скляний флакон — на шкірі залишає неприємне відчуття на годину.
  lore_en: Sewer slugs leave thick, glistening mucus trails wherever they drag themselves through the dark. Alchemists prize this slime as a base for lubricants and burn-soothing salves, though it must be collected in sealed glass — on bare skin it causes an unpleasant tingling that lingers for an hour. The vials are always slightly warm to the touch.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG item, presented as a standalone item. A small sealed glass vial filled with a thick, translucent mucus of pale greenish-grey, with slow-moving bubbles visible through the curved glass. The exterior of the vial is smeared with dried residue of the same substance, clouding the glass near the cork stopper. The slime catches the light with a faint iridescent sheen, hinting at its alchemical properties despite its repellent origin. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
  type: resource
  subtype: gland
  rarity: common
  weight: 0.2
  stackable: true
  max_stack: 30
  sell_price: 3
- id: item_centipede_leg
  name: Нога Сколопендри
  description: Сегментована хітинова нога каналізаційної сколопендри. Міцна і гнучка.
  full_description: Кожна каналізаційна сколопендра має 40 ніг — і кожна є дрібним витвором природи. Хітинова структура дозволяє їм згинатися у будь-якому напрямку. Ковалі-артефактори вивчають їх як зразок гнучкого з'єднання секцій броні.
  lore_en: Each sewer centipede carries forty legs — each one a minor masterwork of natural engineering, capable of bending in any direction without snapping. The chitinous structure is jointed with uncanny precision, flexing under pressure and springing back without deformation. Artifice smiths study them as living blueprints for flexible armor segmentation.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG item, presented as a standalone item. A single centipede leg, roughly eight centimeters long, composed of multiple articulated chitin segments tapering to a fine hooked claw at the tip. The color is a deep amber-brown with a subtle glossy sheen, each joint slightly darker where the segments overlap. The surface is marked with fine longitudinal ridges and faint moisture stains from the sewer environment, yet the structural integrity remains clearly evident. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
  type: resource
  subtype: trophy
  rarity: uncommon
  weight: 0.05
  stackable: true
  max_stack: 30
  sell_price: 4
- id: item_centipede_chitin
  name: Хітин Сколопендри
  description: Пластина хітину з панцира каналізаційної сколопендри. Тверда як дерево.
  full_description: Нагрудний панцир каналізаційної сколопендри складається з десятків хітинових пластин. Кожна тверда як клен і при цьому напрочуд легка. Ремісники із захопленням беруть цей матеріал для виготовлення легкої броні та декоративних виробів.
  lore_en: The dorsal shell of the sewer centipede is composed of dozens of overlapping chitin plates, each one as hard as dense maple wood yet surprisingly light in the hand. The interlocking structure distributes impact across its full surface before any single plate can crack. Craftsmen eagerly purchase this material for lightweight armor and decorative inlays.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG item, presented as a standalone item. A flat dorsal chitin plate harvested from a large centipede, roughly palm-sized, with a segmented surface of tightly overlapping amber-brown scales each etched with faint natural striations. The material has a matte finish with subtle depth, darker at the overlapping edges and slightly paler at the center of each plate. Faint moisture marks and a thin film of dried sewer grime cling to the underside, contrasting with the cleaner top surface. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
  type: resource
  subtype: carapace
  rarity: uncommon
  weight: 0.15
  stackable: true
  max_stack: 20
  sell_price: 7
- id: item_ooze_nucleus
  name: Ядро Слизоти
  description: Щільне ядро з тіла каналізаційної слизоти. Пульсує слабким зеленим світлом.
  full_description: У самому центрі тіла каналізаційної слизоти знаходиться щільне магічне ядро. Воно пульсує слабким зеленим світлом навіть після смерті істоти. Маги сплачують великі гроші за ці ядра — вони є компонентом для зілля регенерації та отруйних чарів.
  lore_en: At the core of every sewer ooze sits a dense magical nucleus, no larger than a plum, that pulses with a faint green glow long after the creature's death. The substance within is neither solid nor liquid — it holds its shape under pressure but flows slowly if left undisturbed. Mages pay handsomely for these; they are a key component in regeneration potions and poison enchantments.
  image_prompt: Vray render, photo-realistic 3D render of a single high-tier exceptional MMORPG item, presented as a standalone item. A dense, semi-translucent orb roughly the size of a plum, glowing with a soft pulsing green light from deep within its gelatinous core. The outer surface has a faintly rubbery texture with small irregular bumps, its color shifting from murky olive-green at the edges to a vivid, luminous emerald at the center. Thin dark veins of denser material spiral inward toward the glowing nucleus, and a faint wet sheen catches the light across its surface. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
  type: resource
  subtype: magical
  rarity: rare
  weight: 0.3
  stackable: true
  max_stack: 5
  sell_price: 35
- id: item_troll_tooth
  name: Зуб Троля
  description: Масивний жовтий зуб каналізаційного троля. Розміром з кулак дорослого чоловіка.
  full_description: 'Тролі каналізації ніколи не чистять зуби — це видно без зайвих слів. Проте їхні зуби напрочуд міцні: витримують укуси каменю і металу. Ювеліри роблять із них екстравагантні кулони, а зброярі — руків''я для унікальних кинджалів.'
  lore_en: Sewer trolls never clean their teeth, and the evidence is unmistakable — yet despite the filth, their teeth are extraordinarily hard, capable of biting through stone and soft metal alike. Jewelers fashion the larger ones into extravagant pendants; weaponsmiths grind the smaller ones into unique dagger grips. The smell fades with proper treatment, mostly.
  image_prompt: Vray render, photo-realistic 3D render of a single high-tier exceptional MMORPG item, presented as a standalone item. A large, roughly conical troll tooth standing nearly ten centimeters tall, the ivory-white enamel deeply stained with brown and black at the base where it was rooted in living flesh. The surface is pitted and scratched from contact with stone and metal, yet the underlying material clearly possesses immense density, with a faint crystalline glint visible along the worn tip. Thick deposits of calcified grime ring the root, testament to its foul origin deep in the sewer tunnels. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
  type: resource
  subtype: trophy
  rarity: rare
  weight: 0.8
  stackable: true
  max_stack: 5
  sell_price: 40
- id: item_hive_chitin
  name: Вуликовий Хітин
  description: Чорний глянцевий хітин з броні вуликового дрона. Надзвичайно міцний.
  full_description: Черепаховий хітин вуликових дронів — найміцніший органічний матеріал, знайдений у каналізації. Блискуче чорне покриття відбиває вологу і чинить опір кислоті. Бронярі верхнього рівня шукають його для виготовлення елітних обладунків.
  lore_en: The carapace chitin harvested from hive drones is the hardest organic material found anywhere in the sewers — a glossy black shell that repels moisture and resists acid with equal stubbornness. Each plate is light enough to hold comfortably yet rings like iron when struck. Master armorsmiths seek it out as a prestige crafting material for elite gear.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG item, presented as a standalone item. A curved carapace plate of deep obsidian-black chitin, roughly hand-sized, with a high-gloss surface that reflects light in sharp, clean highlights. The material has a subtle hexagonal micro-texture across its face, echoing the hive structure of its origin, and the edges are precisely defined with no cracking or warping. A faint iridescent sheen of dark blue-green shifts across the surface at certain angles, hinting at its exceptional density and acid-resistant properties. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
  type: resource
