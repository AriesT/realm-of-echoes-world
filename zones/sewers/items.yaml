  max_stack: 20
  sell_price: 5
- id: item_plague_tissue
  name: Чумна Тканина
  description: Темна некротична тканина з тіла чумного зомбі. Небезпечна без рукавиць.
  full_description: Чумні зомбі каналізації несуть у своїй плоті залишки стародавньої хвороби. Некротична тканина з їхніх тіл використовується у темній алхімії та дослідженнях нежиті. Брати її без рукавиць не рекомендується — навіть мертва, вона зберігає деяку заразність.
  lore_en: Plague zombies carry remnants of an ancient sickness in their rotting flesh, and even dead tissue retains a faint contagion that makes careless handling genuinely dangerous. Sealed in wax cloth and kept cold, the necrotic material serves dark alchemy and undead research alike. Scholars debate whether the disease within is truly dormant — or merely patient.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG item, presented as a standalone item. A small parcel of dark necrotic tissue wrapped in yellowed wax cloth and bound with rough twine, the edges of the wrapping stained with dark brownish-black seepage. Where the cloth has been folded back, a glimpse of the tissue beneath shows mottled grey-green flesh with an unnatural, slightly glistening surface and faint dark veining. A thin haze of sickly pallor surrounds the parcel, and the wax cloth carries dried smears of the same discoloration, suggesting the material's persistent and unpleasant nature. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
