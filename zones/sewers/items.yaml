  stackable: true
  max_stack: 3
  sell_price: 120
- id: item_sewer_crystal
  name: Каналізаційний Кристал
  description: Самородний кристал з підземних порід каналізації. Випромінює тьмяне блакитне світло.
  full_description: 'Підземні води каналізації протягом сотень років вимивали мінерали з навколишнього каменю. Там де вода стояла найдовше — утворились ці дивні блакитні кристали. Маги та ювеліри сперечаються про їхню природу, але всі погоджуються: вони коштують чимало.'
  lore_en: Where the underground waters of the sewers have stood longest, they leach minerals from surrounding rock over centuries and deposit them in strange blue crystalline formations. Each one is unique in shape — jagged spires, flat tabular growths, interlocking clusters — but all share the same deep cerulean color and faint inner glow. Mages and jewelers still argue about their true nature, but all agree they are worth good coin.
  image_prompt: Vray render, photo-realistic 3D render of a single high-tier exceptional MMORPG item, presented as a standalone item. A raw crystal cluster of deep cerulean blue, roughly fist-sized, with multiple irregular prismatic spires growing from a common base of mineral-encrusted matrix rock. The crystal faces are naturally smooth and catch light in sharp blue-white reflections, while a faint internal glow of soft aquamarine emanates from the deepest part of the cluster. The base matrix is rough and stained with the grey-brown mineral deposits of sewer stone, grounding the crystalline beauty in its underground origin. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
  type: resource
  subtype: gem
  rarity: rare
  weight: 0.4
  stackable: true
  max_stack: 5
  sell_price: 50
- id: item_leech_sac
  name: Мішечок П'явки
  description: Слизовий мішок із тіла печерної п'явки. Містить кров і антикоагулянт.
  full_description: Печерні п'явки зберігають висмоктану кров у спеціальному внутрішньому мішечку. Цей мішечок разом із природним антикоагулянтом — цінний компонент для алхімічних розчинників. Хірурги-лікарі також беруть живих п'явок — але мертвий мішечок теж іде в справу.
  lore_en: Cave leeches store drawn blood in a specialized internal sac, keeping it fluid with a natural anticoagulant that alchemists prize as a solvent base. The sac itself, carefully extracted without rupturing, holds its contents for days before degrading. Field surgeons have their own uses for live leeches, but the harvested sac carries applications entirely its own.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG item, presented as a standalone item. A small, pinkish-grey organic sac no larger than a walnut, translucent enough to show the dark reddish-brown fluid within, its surface soft and slightly wrinkled with faint vein-like striations running across it. The texture is moist and glistening, with a thin film of organic residue clinging to the exterior. The sac has been cleanly separated at the neck and is pinched shut, faint dark staining marking the point of extraction from its host. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
  type: resource
  subtype: gland
  rarity: common
  weight: 0.1
