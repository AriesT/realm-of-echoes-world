- id: item_goblin_war_shiv
  name: Гоблінський Бойовий Шив
  description: Довгий загострений кинджал, викований гоблінами каналізації. Краще за іржавий металобрухт.
  full_description: Гобліни каналізації — невеликий народ, але ковалі серед них є. Бойовий шив — їхня стандартна зброя, вирізнений
    грубими рунами на леза. Якість посередня, але це справжня кована зброя, а не металобрухт.
  lore_en: The sewer goblins are a small folk, but they have smiths among them. The war shiv is their standard weapon, marked
    with crude runes along the blade. Quality is mediocre, but it is real forged steel — not scrap.
  image_prompt: Photorealistic dark fantasy item illustration, cinematic MMORPG concept art, dramatic lighting. A crude but
