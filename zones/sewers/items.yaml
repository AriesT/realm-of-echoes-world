- id: item_troll_bone_blade
  name: Кістяний Клинок Троля
  description: Кістка троля, заточена до бритвяної гостроти. Груба, але небезпечна.
  full_description: Тролі каналізації іноді точать власні кістки після бою — замінюючи зламане. Ця зброя виготовлена майстром-шукачем
    із кістки вбитого троля — стовбурної, товстої, загостреної. Неохайна й немодна, але її бойові характеристики вражають
    навіть досвідчених воїнів.
  lore_en: Sewer trolls sometimes sharpen their own bones after battle — replacing what broke. This weapon was crafted by
    a skilled seeker from the leg bone of a slain troll — thick, dense, honed to an edge. Crude and unfashionable, but its
    combat performance surprises even veteran warriors.
