- id: item_troll_bone_blade
  name: Кістяний Клинок Троля
  description: Кістка троля, заточена до бритвяної гостроти. Груба, але небезпечна.
  full_description: Тролі каналізації іноді точать власні кістки після бою — замінюючи зламане. Ця зброя виготовлена майстром-шукачем із кістки вбитого троля — стовбурної, товстої, загостреної. Неохайна й немодна, але її бойові характеристики вражають навіть досвідчених воїнів.
  lore_en: 'Sewer trolls are known to sharpen their own bones as weapons — replacing what breaks in battle with what regrows overnight. This blade was crafted by a skilled seeker from the leg bone of a slain troll: dense as iron, honed to a genuine cutting edge with hours of careful work. Crude by any smith''s standard, yet its weight and durability surprise even veterans who dismiss it at first glance.'
  image_prompt: Vray render, photo-realistic 3D render of a single high-tier exceptional MMORPG weapon, presented as a standalone item. A substantial single-edged blade carved and ground from a massive troll leg bone, thick and slightly curved, with a honed edge that gleams faintly against the bone's pale grey-white body. The bone is extraordinarily dense and hard, its surface polished smooth along the flat but showing the natural fibrous grain of troll bone tissue — a faint striated pattern visible beneath the surface. Dark waterline stains and sewer grime mark the grip end where the bone was left natural, and thin copper wire is wound tightly around the base of the handle section. Faint scoring marks along the spine show where the craftsman tested and adjusted the blade geometry. Displayed diagonally, full length visible. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
