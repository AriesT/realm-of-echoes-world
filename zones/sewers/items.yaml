- id: item_waterproof_boots
  name: Водонепроникні Чоботи
  description: Товсті шкіряні чоботи обробленні жиром і смолою. Не промокають навіть у каналізаційній воді.
  full_description: Ходити по коліна у каналізаційних водах без хороших чобіт — швидкий спосіб захворіти. Ці чоботи зроблені з товстої кабанячої шкіри і оброблені сумішшю смоли та тваринного жиру. Незручні на суші, але в підземеллі немає нічого кращого для ніг.
  lore_en: Wading through knee-deep sewer water without good boots is a reliable way to fall sick within a week. These are made from thick boar hide and worked through with a compound of pine resin and rendered fat until no water passes through. They are stiff and uncomfortable on dry cobblestones, but underground, where your feet spend hours in standing filth, there is nothing better.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG armor piece, presented as a standalone item. A pair of knee-high boots made from thick boar hide, the grain coarse and pronounced, treated to a dark matte finish with a slightly tacky resin surface that repels moisture visibly. The leather is a deep brownish-black with lighter patches at the toe caps and heel counters where wear has buffed the hide smooth, and a yellowish resin residue is visible in the deeper grain creases. Heavy brass buckles on the outer ankle straps are tarnished green, and the thick double-stitched seams along the vamp and shaft are reinforced with additional cord. A faint grey-green tidemark of sewer mineral deposits rings both shafts at mid-calf height. Displayed as a pair, side by side. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
