- id: item_ancient_sewer_coin
  name: Стародавня Монета Каналізації
  description: Стара монета невідомого карбування знайдена у підземних руїнах. Колекціонери дадуть добре.
  full_description: Каналізація під Кам'яною Бродею стара — набагато старіша за саме місто. Хтось ходив цими тунелями задовго
    до того, як перші поселенці заклали стіни. Ця монета — один із слідів тих невідомих — колекціонери та знавці старовини
    добре платять за такі знахідки.
  lore_en: The sewers beneath Stone Ford are old — far older than the city itself. Someone walked these tunnels long before
    the first settlers laid the walls. This coin is one of the traces left by those unknowns — collectors and antiquarians
    pay well for such finds.
