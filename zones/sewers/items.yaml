- id: item_ancient_sewer_coin
  name: Стародавня Монета Каналізації
  description: Стара монета невідомого карбування знайдена у підземних руїнах. Колекціонери дадуть добре.
  full_description: Каналізація під Кам'яною Бродею стара — набагато старіша за саме місто. Хтось ходив цими тунелями задовго до того, як перші поселенці заклали стіни. Ця монета — один із слідів тих невідомих — колекціонери та знавці старовини добре платять за такі знахідки.
  lore_en: 'The sewers beneath Stone Ford predate the city above them by an unknown span — someone laid these tunnels before the first settler drove a foundation post. This coin surfaced from the silt of an underground channel: thick, struck in an unfamiliar alloy, bearing a portrait on one face that matches no known dynasty. Collectors and antiquarians pay well for such traces of the unknown, asking questions that the coin itself refuses to answer.'
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG item, presented as a standalone item. A single thick ancient coin larger than a modern copper, struck in a dense dark alloy somewhere between bronze and iron in color, its edges slightly irregular from hand-struck minting. One face bears a worn bas-relief portrait — a figure in a style unlike any current kingdom, the features smoothed by centuries of submersion — while the reverse shows a geometric symbol still partially legible beneath mineral encrustation. The surface is coated in a layered patina of dark green verdigris, brown iron oxide, and white calcium deposits from sewer water, with small clean patches where a finder rubbed the face to reveal the image beneath. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
