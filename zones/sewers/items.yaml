- id: item_sewer_cloak
  name: Каналізаційна Накидка
  description: Накидка з вичиненої шкури гігантського щура. Водостійка і досить міцна.
  full_description: Найкращий захист у каналізації — той, що не вбирає воду. Ця накидка зшита зі шкури гігантського щура — груба, водостійка, з глибоким капюшоном. Ловці щурів носять їх роками, і вони справді захищають від підземної вогкості й дрібних укусів.
  lore_en: 'The first lesson of underground work: that which absorbs water will kill you slower but just as surely as a blade. This cloak is sewn from giant rat hide — coarse-grained, naturally waterproof, and cut with a deep hood that sheds dripping ceiling water. Rat catchers wear them for years at a stretch; the hide toughens with time and the cloak genuinely earns its reputation against damp and small bites alike.'
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG armor piece, presented as a standalone item. A full-length hooded cloak sewn from panels of giant rat hide, the fur stripped and the outer surface left with its natural coarse grain — a mottled dark grey-brown with irregular darker patches where the hide varied in thickness. The surface has a faint natural sheen from lanolin and wear, and the hide seams are stitched with thick sinew in overlapping cross-stitch rows. Water droplets bead and roll off the surface rather than soaking in, and the deep hood interior is lined with a rough underfur layer still attached at the crown. The lower hem shows brown sewer waterline staining and a few old scratches from tunnel debris. Displayed front-facing, laid flat or propped. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
