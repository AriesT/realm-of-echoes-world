- id: item_sewer_leather_cap
  name: Каналізаційна Шкіряна Шапка
  description: Шкіряна шапка просочена вапняком від каналізаційних вод. Захищає від крапель і ударів.
  full_description: Мисливці на щурів давно навчились оброблювати шкіру так, щоб вона не гнила у вогкому підземеллі. Ця шапка просочена спеціальним складом — відштовхує воду і стійка до плісняви. Дешева, практична, пахне підземеллям — але краще ніж нічого.
  lore_en: 'Rat catchers long ago worked out how to treat leather so it does not rot in the perpetual damp of underground tunnels — a hard-won trade secret passed between generations. This cap is treated with that special compound: it repels standing water and resists the mold that claims untreated goods within days. It smells unmistakably of the underground, but in the sewers that is hardly remarkable.'
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG armor piece, presented as a standalone item. A simple close-fitting leather cap with a short brim, cut from a single piece of thick hide and stitched with heavy waxed cord along the crown seam. The leather has a dark, slick appearance from its waterproofing treatment — a matte charcoal-brown with an almost greasy surface sheen — and shows faint tide marks and subtle mold stains along the lower brim edge. The stitching is competent but plain, and small stress cracks run through the leather at the fold points near the ears. Displayed upright on its base, looking forward. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
