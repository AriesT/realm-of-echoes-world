- id: item_bone_club
  name: Кістяна Дубина
  description: Важка кістка троля, зв'язана шкіряними ремінями. Проста але ефективна.
  full_description: Коли вибір зброї обмежений темрявою каналізації — кістка підійде. Ця дубина зроблена з великої кістки
    — можливо, кінцівки якогось великого звіра. Важка і незграбна, але один добрий удар може вибити дух з будь-кого.
  lore_en: When weapon choices are limited to sewer scavenging, a bone will do. This club is fashioned from a large limb bone
