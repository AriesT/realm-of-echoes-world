- id: item_rat_poison_vial
  name: Флакон Щурячої Отрути
  description: Концентрована отрута для щурів у маленькому флаконі. Ефективна і проти людей.
  full_description: Ловці щурів готують цю отруту самі — суміш каналізаційних трав і жовчі. Розведена — відлякує гризунів. Нерозведена — завдає серйозної шкоди тому, хто випадково її ковтне. Деякі авантюристи використовують її для змащення клинків.
  lore_en: Rat catchers brew this poison themselves from sewer herbs, bile, and other ingredients best left unnamed. Diluted in water it drives rodents from a stretch of tunnel; taken neat, it causes severe harm to man or beast. Blade-coaters use it sparingly — a little goes a long way, and a trembling hand can ruin the wrong person's day.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG consumable item, presented as a standalone item. A squat, thick-walled glass vial stoppered with a crude cork plug wound in greasy twine, its surface clouded and pitted from sewer humidity. The liquid inside is a murky brownish-green, slightly viscous, with dark sediment settled at the bottom and an oily iridescent film floating at the surface. The exterior glass is smeared with grimy fingerprints and faint yellowish stains, and the twine stopper is darkened with moisture and old grime. A rough hand-scratched mark — a simple skull — is etched into the glass near the base. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
