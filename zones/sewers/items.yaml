- id: item_goblin_war_shiv
  name: Гоблінський Бойовий Шив
  description: Довгий загострений кинджал, викований гоблінами каналізації. Краще за іржавий металобрухт.
  full_description: Гобліни каналізації — невеликий народ, але ковалі серед них є. Бойовий шив — їхня стандартна зброя, вирізнений грубими рунами на леза. Якість посередня, але це справжня кована зброя, а не металобрухт.
  lore_en: 'The sewer goblins are small but not without craft — among them are smiths who hammer real steel over smoky underground fires. The war shiv is their standard weapon: a short, thick blade bearing crude runes scratched along its flat in a goblin hand. The workmanship is rough, but it is forged steel and not scrap, and that distinction matters when blades cross in the dark.'
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG weapon, presented as a standalone item. A short, thick-bladed knife with a wide single-edged blade of dark iron, roughly finished but genuinely forged with a consistent grind and a serviceable edge. The blade bears a series of small crude runes scratched along the flat — primitive marks in an uneven hand — and the metal shows a dark patina with light surface rust and moisture staining from sewer air. The handle is wrapped in coarse leather strips dyed a muddy greenish-brown and secured with copper wire gone green with verdigris. A small notch near the crossguard suggests it has seen actual use against other weapons. Displayed diagonally, full length visible. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
