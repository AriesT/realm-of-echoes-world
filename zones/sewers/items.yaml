- id: item_bone_club
  name: Кістяна Дубина
  description: Важка кістка троля, зв'язана шкіряними ремінями. Проста але ефективна.
  full_description: Коли вибір зброї обмежений темрявою каналізації — кістка підійде. Ця дубина зроблена з великої кістки — можливо, кінцівки якогось великого звіра. Важка і незграбна, але один добрий удар може вибити дух з будь-кого.
  lore_en: When the sewers offer no steel, the resourceful scavenger turns to bone. This club is fashioned from a single massive limb bone — dense, yellowed, and heavier than it looks, likely from some great beast that met its end underground. Awkward to swing in a tight tunnel, but one well-placed blow carries enough weight to end a fight quickly.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG weapon, presented as a standalone item. A crude bludgeon made from a single large animal limb bone, its natural knuckle end forming a heavy striking head and the shaft tapering to a rough grip. The bone is a deep yellowed-ivory, stained darker at the base with brown sewer sediment and mottled with dark moisture patches and old organic residue. Shallow scrape marks along the shaft show where it was cleaned and roughly shaped, and hairline cracks run along the thinner sections of the grip end. The surface texture is dry and granular where exposed, slick and discolored where sewer damp has soaked in over time. Displayed diagonally, full length visible. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
