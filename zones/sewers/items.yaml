  max_stack: 15
  sell_price: 12
- id: item_hive_queen_venom
  name: Отрута Королеви Вулика
  description: Темна фіолетова отрута із залоз Королеви. Надзвичайно смертоносна і цінна.
  full_description: Жало Королеви Вулика містить отруту, яка паралізує навіть великих тварин за кілька секунд. Алхіміки вважають її найціннішим інгредієнтом у каналізаційних глибинах. Маленький флакон дорівнює вартості місячного утримання цілого дружинника.
  lore_en: The stinger of the Hive Queen delivers a venom that drops even large creatures within seconds, seizing muscle and nerve with terrifying efficiency. Alchemists consider it the single most valuable ingredient recoverable from the sewer depths, and the market reflects it — a small sealed vial commands the monthly salary of an entire city guardsman. Few survive the harvesting.
  image_prompt: Vray render, photo-realistic 3D render of a single epic-tier masterwork MMORPG item, presented as a standalone item. A small masterwork glass vial sealed with a polished obsidian stopper and wrapped at the neck with fine black wire binding, containing a viscous amber-gold liquid that glows with a faint inner luminescence. The venom within swirls slowly with visible density, casting pale golden light through the glass and projecting faint warm reflections onto the stopper. Tiny dark particulates drift suspended in the liquid, and a faint mist clings to the inner glass near the seal, hinting at the volatile and extraordinary potency within. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
