- id: item_ring_of_depths
  name: Каблучка Глибин
  description: Стародавня каблучка знайдена в затопленому сховку. Випромінює слабку магію підземель.
  full_description: 'Хтось загубив цю каблучку у підземних водах багато років тому. Вона вкрита дивними рунами, які жоден відомий маг не може прочитати повністю. Ті, хто її носить, помічають: в темряві підземель вони бачать трохи краще і відчувають себе впевненіше.'
  lore_en: 'This ring lay in underground water for years before a sewer-delver fished it out, drawn by the faint warmth it gave off even soaking wet. The band is covered in runes no living mage has been able to fully decipher, though scholars agree they predate the city above by centuries. Those who wear it notice the same thing: in deep darkness, their sight sharpens slightly, and the oppressive weight of underground stone feels somehow less absolute.'
