- id: location_sewer_junction_a
  district_id: district_stone_ford
  name: Перший Розвилок
  description: Перший великий розвилок тунелів. Три проходи ведуть у різні боки 
    каналізації.
  full_description: 'Одразу за входом тунелі розходяться у три боки. Центральний прохід
    відчинений — звідси тягне вогкістю і запахом гнилі. На стінах — стара розмита
    напис крейдою: «Стережись Щурів». Над головою шумить вода у занедбаних жолобах.'
  lore_en: 'Just past the entrance, the tunnels branch three ways. The central passage
    gapes open — from it drifts dampness and the smell of rot. On the walls, an old
    smeared chalk inscription: ''Beware the Rats''. Above, water rushes through neglected
    gutters.'
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A T-junction of ancient stone sewer tunnels, moss-covered walls, 
    shallow water on floor, flickering torch in distance.
  ambient_sound: sewer_drip
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_east_inlet
  district_id: district_stone_ford
  name: Східний Водовід
  description: Вузький тунель де з верхнього міста стікає вода. Гамірно від 
    дзюркоту.
  full_description: Зі стелі цього тунелю безперервно стікають струмки нечистот 
    з ремісничого кварталу. Земля слизька, а стіни вкриті зеленим мохом аж до 
    половини висоти. Отвори у стелі з'єднані з ринвами вулиці — у дощ тут ціла 
    повінь. Щури почуваються тут як вдома.
  lore_en: From the ceiling of this tunnel, constant streams of effluent flow 
    down from the craftsmen's quarter above. The floor is slippery, and the 
    walls are coated in green moss up to half their height. Openings in the 
    ceiling connect to street gutters — during rain, this becomes a flood. Rats 
    feel right at home here.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A narrow sewer tunnel with water streaming from ceiling grates, 
    thick green moss on walls, rat silhouettes in dim light.
  ambient_sound: sewer_drip
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_guard_ruins
  district_id: district_stone_ford
  name: Руїни Вартового Поста
  description: Залишки старого поста вартових каналізації. Тут можна відпочити і
    зустріти ловця щурів.
  full_description: Колись тут стояв пост каналізаційних наглядачів — 
    підтверджують цьому стіл, кілька зламаних стільців і облупленість стін. Нині
    це місце облюбував Петрусь — місцевий ловець щурів, що ладен обмінятися 
    корисним і купити щурячі хвости. Фігурне вікно у стіні відчиняється у темний
    бічний коридор. Тут порівняно безпечно — принаймні більші монстри поки що 
    сюди не добрались.
  lore_en: This was once a watchpost for sewer overseers — evidenced by the 
    table, broken chairs and peeling walls. Now it is favored by Petrus, a local
    rat catcher willing to trade useful goods and buy rat tails. A barred window
    in the wall opens into a dark side corridor. It is relatively safe here — at
    least the larger monsters have not reached this far yet.
  type: dungeon
  is_safe: true
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A ruined underground guardpost with broken furniture, torch-lit 
    alcove, a grizzled man sorting rat tails, relative safety.
  ambient_sound: sewer_drip
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_north_sluice
  district_id: district_stone_ford
  name: Північний Шлюз
  description: Стара шлюзова кімната з іржавими засувками. Запах тут особливо 
    різкий.
  full_description: Шлюзи колись регулювали потік каналізаційних вод між 
    рівнями. Тепер вони заіржавіли у відкритому положенні — вода тече 
    нерегульовано. На підлозі — сантиметрів десять темної стоячої води. Із щілин
    у стінах чутно скрипіння і шурхіт — щурів тут незліченно.
  lore_en: The sluices once regulated the flow of waste water between levels. 
    Now they have rusted open — the water flows uncontrolled. The floor holds 
    ten centimeters of dark standing water. From cracks in the walls come 
    scratching and rustling — countless rats inhabit here.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. An ancient sewer sluice chamber with rusted iron gates, dark 
    standing water on floor, rat eyes gleaming in cracks.
  ambient_sound: sewer_drip
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_west_channel
  district_id: district_stone_ford
  name: Західний Канал
  description: Широкий головний канал що тягнеться на захід. Тут повно слизунів.
  full_description: Цей широкий канал — основна транспортна артерія верхніх 
    каналізаційних рівнів. Колись тут плавали баржі обслуговування, тепер — лише
    каналізаційні слизуни. Стіни вкриті шаром мулу і зеленого наросту. Слизові 
    сліди на підлозі ведуть у кількох напрямках.
  lore_en: This wide channel was once the main transport artery of the upper 
    sewer levels. Maintenance barges once floated here; now only sewer slugs do.
    The walls are coated in mud and green growth. Slime trails on the floor lead
    in several directions.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A wide underground sewer channel with vaulted ceiling, slugs on 
    walls, slime trails on wet stone floor.
  ambient_sound: sewer_flow
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_workers_alcove
  district_id: district_stone_ford
  name: Альков Каналізаторів
  description: Невелика бічна кімнатка де колись відпочивали робітники. Старі 
    інструменти на стінах.
  full_description: Цей альков використовувався каналізаційниками для зберігання
    інструментів і коротких перерв. На іржавих гачках досі висять деякі лопати і
    гаки. Зламана лавка у кутку і старий ліхтар без масла. Слизові сліди 
    говорять, що нинішні мешканці — слизуни, а не робітники.
  lore_en: This alcove was used by sewer workers for tool storage and short 
    breaks. On rusty hooks still hang several shovels and hooks. A broken bench 
    in the corner and an old lamp without oil. Slime trails indicate the current
    residents are slugs, not workers.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A small underground worker's alcove, rusty tools on walls, broken 
    furniture, slime trails, atmospheric dim light.
  ambient_sound: sewer_drip
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_pump_chamber
  district_id: district_stone_ford
  name: Насосна Камера
  description: Кімната зі старим насосом що давно не працює. Чути шум далекого 
    потоку.
  full_description: Велике металеве колесо насосу заіржавіло у нерухомому стані 
    десятки років тому. Без нього вода у нижніх рівнях не циркулює — звідси і 
    стоячі болота в глибині. Коли-не-коли, тунель наповнюється гучним шумом з 
    нижніх водопропускних каналів. Сколопендри облюбували простір за насосом.
  lore_en: The great metal pump wheel rusted to a standstill decades ago. 
    Without it, water in the lower levels does not circulate — hence the 
    stagnant swamps in the depths. Occasionally, the tunnel fills with a loud 
    roar from lower drainage channels. Centipedes have claimed the space behind 
    the pump.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. An underground pump chamber with a massive rusted iron wheel 
    mechanism, centipedes crawling on walls, distant water sounds.
  ambient_sound: sewer_flow
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_lower_gate
  district_id: district_stone_ford
  name: Нижні Ворота
  description: Масивні кам'яні ворота між верхнім і середнім рівнями. Прохід 
    звужується тут.
  full_description: 'Стародавні кам''яні ворота між рівнями каналізації — вузький
    прохід шириною лише для однієї людини. На воротях вирізані попереджувальні знаки
    давньою мовою. За воротами — різкий перепад температури і набагато більша вогкість.
    Тут відчутно: далі — небезпечніші краї.'
  lore_en: 'Ancient stone gates between sewer levels — a narrow passage wide enough
    for only one person. Warning signs in an old language are carved on the gates.
    Beyond the gates the temperature drops sharply and humidity increases greatly.
    Here you sense it: what lies ahead is far more dangerous.'
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. Ancient stone sewer gate with carved warning runes, narrow 
    passage, dramatic lighting, atmosphere of foreboding.
  ambient_sound: sewer_drip
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_central_hub
  district_id: district_stone_ford
  name: Центральний Вузол
  description: Широка кругла зала — серце середнього рівня каналізації. 
    Розгалуження у чотири боки.
  full_description: 'Центральний Вузол — найбільший відкритий простір середнього рівня.
    Висока купольна стеля губиться у темряві. Чотири тунелі відходять у різні сторони,
    і кожен має свій характер: зі сходу — запах болота, з заходу — запах гоблінського
    вогнища, з півдня — абсолютна пітьма. На підлозі помітні сліди від різних істот.'
  lore_en: 'The Central Hub is the largest open space of the middle sewer level. The
    high domed ceiling is lost in darkness above. Four tunnels branch in different
    directions, each with its own character: from the east — swamp smell, from the
    west — goblin fire smell, from the south — absolute darkness. On the floor, tracks
    from various creatures are visible.'
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A large round domed sewer hub chamber, four tunnels branching 
    outward, torchlight from multiple directions, creature tracks on wet stone.
  ambient_sound: sewer_flow
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_flooded_nave
  district_id: district_stone_ford
  name: Затоплений Неф
  description: Довгий коридор по коліна у темній воді. Лічать печерних п'явок.
  full_description: Колись цей широкий коридор слугував як головна дренажна 
    лінія. Тепер він затоплений по коліна — темна вода приховує усе, що є на 
    дні. У воді живуть печерні п'явки, що непомітно прикріплюються до ніг. На 
    стінах видно старі позначки рівня води — нинішній рівень вдвічі вищий за 
    норму.
  lore_en: This wide corridor once served as a main drainage line. Now it is 
    knee-deep in dark water that conceals everything on the bottom. Cave leeches
    inhabit the water, silently attaching to legs. Old water-level marks on the 
    walls show the current level is twice the norm.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A long sewer corridor flooded knee-deep with dark stagnant water, 
    leeches visible on stone walls, dim light reflecting on water surface.
  ambient_sound: sewer_flow
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_goblin_bazaar
  district_id: district_stone_ford
  name: Гоблінський Базар
  description: Неочікувано жвава гоблінська торговельна зона. Тут можна купити 
    рідкісне або продати трофеї.
  full_description: 'Посеред каналізаційних небезпек — невелика зона де гобліни влаштували
    торгівлю. Нейтральна зона за негласним договором: зброю прибирають при вході.
    Тут торгує Зораз — гоблінський торговець-відступник, що розмовляє людською мовою.
    Асортимент строкатий: від краденого посуду до рідкісних каналізаційних знахідок.
    Торгувати можна, битись — заборонено під страхом смерті від усіх гоблінів одразу.'
  lore_en: 'Amid the sewer dangers sits a small zone where goblins set up trade. A
    neutral zone by unspoken agreement: weapons are sheathed on entry. Here trades
    Zorax — a renegade goblin merchant who speaks human tongue. The stock is eclectic:
    stolen kitchenware to rare sewer finds. Trade is welcome; fighting is forbidden
    on pain of death from every goblin at once.'
  type: dungeon
  is_safe: true
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A goblin marketplace in an underground sewer chamber, colorful 
    stolen goods on crude stalls, torches everywhere, goblins haggling.
  ambient_sound: dungeon_ambient
  music: town_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_cistern_east
  district_id: district_stone_ford
  name: Східна Цистерна
  description: Кругла підземна цистерна для збору дощових вод. Нині служить 
    гнізду гігантських щурів.
  full_description: Ця кругла кімната з куполом — колишня резервна цистерна для 
    дощових вод. Стіни мають кілька метрів у ширину і колись були 
    водонепроникні. Тепер у цистерні панують гігантські щури — тут їхнє головне 
    гніздо в зоні. Запах нестерпний. Очей у темряві — безліч.
  lore_en: This circular domed chamber was once a reserve cistern for rainwater.
    The walls are several meters thick and were once watertight. Now giant rats 
    rule the cistern — it is their main nest in this zone. The smell is 
    unbearable. Eyes in the darkness — countless.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A circular stone cistern chamber, giant rats nesting in corners, 
    bones and debris on floor, glowing eyes in darkness.
  ambient_sound: sewer_drip
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_cistern_west
  district_id: district_stone_ford
  name: Західна Цистерна
  description: Друга велика цистерна, затоплена наполовину. В глибині — 
    мерехтіння кристалів.
  full_description: Ця цистерна зазнала обвалу однієї із стін — вода заповнила 
    половину приміщення. Під водою видно щось блискуче — каналізаційні кристали 
    у нижніх шарах каменю. Туди ж заглядає Щурячий Король, що любить цю тиху 
    затоку. Дістатись кристалів — значить пройти через Короля.
  lore_en: This cistern suffered a wall collapse — water fills half the chamber.
    Under the water something gleams — sewer crystals in the lower stone layers.
    The Rat King also frequents this quiet cove. To reach the crystals means 
    getting past the King.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A half-flooded cistern with glowing blue crystals visible under 
    the water surface, Rat King throne of debris in corner.
  ambient_sound: sewer_flow
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_bone_channel
  district_id: district_stone_ford
  name: Кістковий Канал
  description: Широкий канал устелений кістками давніх жертв. Небезпека 
    відчувається на кожному кроці.
  full_description: 'Підлога цього широкого каналу густо вкрита кістками — людськими,
    тваринними і невідомими. Хтось або щось зволікало своїх жертв сюди роками. Зараз
    тут мешкають слизоти, що розчиняють кістки заради мінералів. Ходити обережно:
    кістки слизькі.'
  lore_en: 'The floor of this wide channel is thickly carpeted with bones — human,
    animal, and unidentifiable. Something dragged its victims here for years. Now
    sewer oozes inhabit the space, dissolving bones for their minerals. Step carefully:
    bones are slippery.'
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A wide sewer channel floor covered in bones of various creatures, 
    acidic ooze dissolving remains, eerie bone-white lighting.
  ambient_sound: sewer_drip
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_ooze_pit
  district_id: district_stone_ford
  name: Яма Слизоти
  description: Глибока яма заповнена слизотою. Живий кислотний килим поглинає 
    все що падає.
  full_description: Відгалуження каналу закінчується природньою ямою, повністю 
    заповненою живою слизотою. Вона булькає і пузириться — поверхня схожа на 
    кислотне болото. Нічого, що потрапляє у яму, не виходить назад. Деякі 
    сміливці ловлять ядра слизоти зі країв — дуже ризикований спосіб заробітку.
  lore_en: A channel offshoot ends in a natural pit completely filled with 
    living ooze. It bubbles and froths — the surface resembles an acid swamp. 
    Nothing that falls in comes back out. Some daring souls fish for ooze nuclei
    from the edges — a very risky way to earn coin.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A pit filled with bubbling acidic green ooze, steam rising from 
    surface, dissolved debris visible, dangerous glow.
  ambient_sound: sewer_flow
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_slime_corridor
  district_id: district_stone_ford
  name: Слизький Коридор
  description: Вузький коридор повністю покритий слизом гігантських слизунів. 
    Майже неможливо стояти.
  full_description: Стіни, стеля і підлога цього вузького коридору вкриті шаром 
    слизу гігантських слизунів. Йти доводиться вздовж стін, чіпляючись за 
    виступи каменю. Самі слизуни розмістились по обидва боки і відреагують на 
    будь-який швидкий рух. Хто йде повільно і обережно — може пройти без бою.
  lore_en: The walls, ceiling and floor of this narrow corridor are coated in 
    giant slug slime. One must move along the walls, gripping stone 
    outcroppings. The slugs themselves are positioned on both sides and will 
    react to any fast movement. Those who move slowly and carefully may pass 
    without a fight.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A narrow sewer corridor completely coated in iridescent slime, 
    giant slugs on both walls, hazardous footing.
  ambient_sound: sewer_drip
  music: dungeon_ambient
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_mushroom_grotto
  district_id: district_stone_ford
  name: Грибний Грот
  description: Природня печера де ростуть великі біолюмінесцентні гриби. 
    Дивовижно красиво.
  full_description: Серед темряви і сморіду — раптовий острівець дивовижної 
    краси. Ця невелика печера вся вкрита великими синьо-зеленими грибами що 
    світяться у темряві. Споровий пил висить у повітрі і мерехтить. Гриби 
    їстівні і дають сили. Але хтось збирає їх перед тобою — залишки зрізаних 
    ніжок свіжі.
  lore_en: Amid darkness and stench — a sudden island of astonishing beauty. 
    This small cave is entirely covered with large blue-green bioluminescent 
    mushrooms. Spore dust hangs in the air and shimmers. The mushrooms are 
    edible and restorative. But someone was here before you — the cut stems are 
    fresh.
  type: dungeon
