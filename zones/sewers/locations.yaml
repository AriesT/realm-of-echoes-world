  full_description: 'Це вузький кам''яний виступ — ледве метр завширшки — над прірвою
    без видимого дна. Звідси видно глибоко вниз: там — мерехтіння рою. Дрони Вулика
    атакують саме тут — з темряви, звалюючись зверху. Кроки мають бути обережними.
    Ліворуч — стара кам''яна ніша з чимось у ній.'
  lore_en: 'This is a narrow stone ledge — barely a meter wide — over a chasm of no
    visible bottom. From here you can see deeply down: hive shimmer visible below.
    Hive Drones attack precisely here — from the darkness, plunging from above. Steps
    must be careful. To the left — an old stone niche with something inside.'
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A narrow stone ledge over a bottomless chasm, hive drones diving 
    from above, glowing swarm visible far below.
  ambient_sound: dungeon_hive
