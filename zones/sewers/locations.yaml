- id: location_sewer_queen_approach
  district_id: district_stone_ford
  name: Підхід до Королеви
  description: Широкий коридор веде до серця Вулика. Тут найгустіші патрулі 
    дронів.
  full_description: Останній прямий шлях до Королеви Вулика — широкий коридор, 
    вистелений хітиновими пластинами. Стіни покриті висохлими комашиними яйцями 
    і личинками. Тут найбільша концентрація дронів — постійні патрулі 
    заступаються кожні кілька хвилин. Пройти тихо майже неможливо. Але є ще час 
    повернутись.
  lore_en: The final direct approach to the Hive Queen — a wide corridor lined 
    with chitin plates. Walls covered in dried insect eggs and larvae. The 
    highest drone concentration is here — constant patrols rotating every few 
    minutes. Passing quietly is nearly impossible. But there is still time to 
    turn back.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A wide corridor lined with black chitin, drone patrols visible, 
    dried insect eggs on walls, oppressive hive presence.
  ambient_sound: dungeon_hive
  music: dungeon_boss
  combat_music: dungeon_boss_combat
  _zone: sewers
- id: location_sewer_hive_outer
  district_id: district_stone_ford
  name: Зовнішній Вулик
  description: Перша камера власне Вулика. Тут живуть Вартові. Відступ все ще 
    можливий.
  full_description: Перша справжня камера Вулика — стіни вкриті чорними 
    хітиновими плитами, з яких виростають комашині нори. Вартові Вулика стоять 
    нерухомо попарно біля кожного проходу. Вони атакують без попередження. Рій 
    відчуває кожен крок — Королева вже знає що ти прийшов.
  lore_en: The first true chamber of the Hive — walls covered in black chitin 
    plates from which insect burrows grow. Hive Guards stand motionless in pairs
    at every passage. They attack without warning. The swarm feels every step — 
    the Queen already knows you have come.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. The outer hive chamber, black chitin walls, paired hive guards 
    flanking passages, the swarm's oppressive presence.
  ambient_sound: dungeon_hive
  music: dungeon_boss
  combat_music: dungeon_boss_combat
  _zone: sewers
- id: location_sewer_hive_inner
  district_id: district_stone_ford
  name: Внутрішній Вулик
  description: Центральне гніздо Вулика. Тут вирощуються дрони і живе решта рою.
  full_description: Тут народжується рій. Тисячі комашиних яєць у нішах стін, 
    личинки у коконах. Дрони снують між нірами без відпочинку. Запах хітину і 
    комашиного пороху непереносний. За центральними вратами — Тронна Зала.
  lore_en: Here the swarm is born. Thousands of insect eggs in wall niches, 
    larvae in cocoons. Drones move between burrows without rest. The smell of 
    chitin and insect pheromones is unbearable. Beyond the central gates — the 
    Throne Chamber.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. The inner hive nursery, thousands of eggs in wall niches, larvae 
    in cocoons, drones rushing between cells, oppressive scale.
  ambient_sound: dungeon_hive
  music: dungeon_boss
  combat_music: dungeon_boss_combat
