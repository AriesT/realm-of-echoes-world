- id: location_sewer_throne_chamber
  district_id: district_stone_ford
  name: Тронна Зала Королеви
  description: Велетенська камера де живе Королева Вулика. Найнебезпечніше місце
    у каналізації.
  full_description: Цей зал — серце Вулика і найнебезпечніше місце у всій 
    підземній системі Кам'яної Броді. Королева тут — велетенська, масивна, 
    оточена роєм. Її жало може вбити з одного удару. Але хто переможе Королеву —
    той зломить Вулик на роки вперед. І отримає її отруту — найцінніший 
    алхімічний компонент у підземеллях.
  lore_en: This hall is the heart of the Hive and the most dangerous location in
    Stone Ford's entire underground. The Queen here is titanic, massive, 
    surrounded by the swarm. Her stinger can kill with a single strike. But 
    whoever defeats the Queen shatters the Hive for years to come. And gains her
    venom — the most valuable alchemical component in the dungeons.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A titanic hive throne chamber, the massive Hive Queen enthroned at
    center, swarm drones orbiting, epic dangerous atmosphere.
  ambient_sound: dungeon_hive
  music: dungeon_final_boss
  combat_music: dungeon_boss_combat
  _zone: sewers
- id: location_sewer_ancient_vault
  district_id: district_stone_ford
  name: Стародавнє Сховище
  description: Стара схованка невідомої цивілізації. Тут знайдено стародавні 
    монети і кристали.
  full_description: Ця схованка значно старіша за каналізацію, за місто і навіть
    за більшість відомих цивілізацій. Хтось тут зберігав щось важливе — 
    залишились тільки кристали і монети. Написи на стінах невідомою мовою 
    розповідають щось — але що саме, ніхто поки не знає. Це місце варте окремої 
    експедиції.
  lore_en: This vault is far older than the sewers, the city, and most known 
    civilizations. Someone stored something important here — only crystals and 
    coins remain. Inscriptions on the walls in an unknown language tell 
    something — but what exactly, no one yet knows. This place deserves a 
    dedicated expedition.
  type: dungeon
  is_safe: false
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. An ancient pre-city vault, unknown language carved on walls, 
    glowing crystals and ancient coins scattered, mystery atmosphere.
  ambient_sound: dungeon_ambient
  music: dungeon_mystical
  combat_music: dungeon_combat
  _zone: sewers
- id: location_sewer_treasure_vault
  district_id: district_stone_ford
  name: Скарбниця Каналізації
  description: Фінальна кімната зі скарбами зібраними попередніми авантюристами.
    Поки що безпечно.
  full_description: 'Парадокс: у самому серці небезпечного підземелля є кімната відносного
    спокою. Попередні авантюристи залишали тут трофеї — мабуть щоб повернутись за
    ними. Деякі так і не повернулись. Тут є сундуки, мотлох і кілька справді коштовних
    речей для тих хто добрався досюди. Але ця кімната не залишиться безпечною вічно.'
  lore_en: 'A paradox: at the very heart of a dangerous dungeon lies a room of relative
    calm. Previous adventurers left trophies here — probably intending to return.
    Some never did. There are chests, clutter, and a few genuinely valuable items
    for those who made it this far. But this room will not stay safe forever.'
  type: dungeon
  is_safe: true
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy 
    MMORPG environment concept art, dark underground sewer dungeon, dramatic 
    lighting. A treasure chamber deep underground, adventurer trophies and 
