- id: monster_hive_guard
  name: Вартовий Вулика
  type: beast
  description: Великий бойовий комах-вартовий. Атакує все що наближається до Вулика.
  full_description: Вартові Вулика — важка піхота рою. Вдвічі більші за дронів, набагато повільніші, але незрівнянно сильніші.
    Їхні щелепи можуть перекусити металевий прут. Вони не відступають — стоять до останнього, захищаючи підходи до Королеви.
    Після загибелі Вартового рій приходить до нестями і посилює атаки.
  lore_en: Hive Guards are the heavy infantry of the swarm. Twice the size of drones, much slower, but incomparably stronger.
    Their mandibles can snap a metal rod. They never retreat — standing to the last, defending approaches to the Queen. After
    a Guard falls, the swarm becomes agitated and intensifies its attacks.
