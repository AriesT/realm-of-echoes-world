- id: monster_rat_king
  name: Щурячий Король
  type: beast
  description: Жахливий ватажок зграї — величезний щур вкритий шрамами і коронований у сплутане кільтя з хвостів.
  full_description: Щурячий Король — не окрема порода, а найсильніший самець зграї, що захопив владу. Його хвіст сплутаний
    з хвостами кількох підлеглих — дивне явище, яке місцеві вважають магічним прокляттям. Він значно розумніший за своїх побратимів,
    організовує пастки і відступи. Коли Король загибає — його зграя на деякий час стає некерованою і особливо небезпечною.
  lore_en: The Rat King is not a separate breed, but the strongest male who seized dominance. His tail is tangled with the
    tails of several subordinates — a strange phenomenon locals call a magical curse. He is far smarter than his pack-mates,
    organizing ambushes and tactical retreats. When the King dies, his pack temporarily becomes uncontrolled and especially
    dangerous.
