- id: monster_sewer_goblin
  name: Каналізаційний Гоблін
  type: humanoid
  description: Дрібний зеленошкірий гоблін, що населяє середні рівні каналізації. Хитрий і спритний.
  full_description: Гобліни каналізації утворили власне суспільство у темних тунелях під містом. Дрібні, зеленошкірі, з великими
    жовтими очима — вони чудово бачать у темряві. На відміну від лісових родичів, ці гобліни навчились виготовляти примітивну
    зброю і броню. Зазвичай нападають зграями, з флангів, намагаючись оточити жертву. У їхніх схованках можна знайти монети
    та дивні трофеї від попередніх жертв.
  lore_en: Sewer goblins have formed their own society in the dark tunnels beneath the city. Small, green-skinned, with large
    yellow eyes — they see perfectly in complete darkness. Unlike their forest cousins, these goblins have learned to craft
    primitive weapons and armor. They typically attack in packs from the flanks, attempting to surround prey. In their hideouts
    you can find coins and strange trophies from previous victims.
  image_prompt: Vray render, photo-realistic 3D render of a creature from a dark fantasy MMORPG, underground sewer dungeon
