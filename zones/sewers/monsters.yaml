- id: monster_sewer_centipede
  name: Каналізаційна Сколопендра
  type: beast
  description: Довга стрімка сколопендра з отруйними щелепами. Атакує блискавично.
  full_description: Каналізаційна сколопендра може сягати метра у довжину і рухається зі швидкістю стріли. Її щелепи ін'єктують
    нейротоксин, що спричиняє тремтіння і слабкість. Зазвичай атакує ззаду або зверху — звалюючись зі стелі у момент коли
    жертва відволікається. Хітин її панцира застосовується у виготовленні легкої броні.
  lore_en: The sewer centipede can reach a meter in length and moves with arrow-like speed. Its mandibles inject a neurotoxin
    causing tremors and weakness. It typically attacks from behind or above — dropping from the ceiling when prey is distracted.
    The chitin of its shell is used in the crafting of lightweight armor.
