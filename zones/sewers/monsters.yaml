- id: monster_sewer_ooze
  name: Каналізаційна Слизота
  type: elemental
  description: Аморфна слизова маса що стікає по стінах каналізації. Роз'їдає все підряд.
  full_description: Каналізаційна Слизота — результат тривалого впливу магічних відходів на колонії грибів і бактерій. Напівживий
    геліє без мозку і очей — але реагує на вібрацію і тепло. Вона роз'їдає метал, шкіру і живу тканину однаковою кислотою.
    Зброя іржавіє після контакту, а незахищена шкіра отримує опіки. Вбити Слизоту непросто — вогонь і сіль є найефективнішими
    засобами.
  lore_en: The Sewer Ooze is the result of prolonged magical runoff exposure on fungal-bacterial colonies. A semi-living gel
    without a brain or eyes — it responds to vibration and heat. It dissolves metal, leather, and living tissue with equal
    acid. Weapons corrode on contact; unprotected skin suffers burns. Killing an Ooze is difficult — fire and salt are the
    most effective means.
  image_prompt: Vray render, photo-realistic 3D render of a creature from a dark fantasy MMORPG, underground sewer dungeon
