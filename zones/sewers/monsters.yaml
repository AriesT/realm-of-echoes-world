- id: monster_hive_drone
  name: Дрон Вулика
  type: beast
  description: Бойовий комах-дрон з глибинного вулика. Швидкий, броньований і смертоносний.
  full_description: Дрони Вулика — бойова каста підземного роя, що мешкає у найглибших рівнях каналізації. Їхній глянцевий
    чорний хітин відбиває дрібні удари. Атакують стрімко, декількома укусами підряд, і одразу відходять. Вони завжди групами
    — одиночний дрон — знак того, що рій поруч.
  lore_en: Hive Drones are the warrior caste of the underground swarm in the deepest sewer levels. Their glossy black chitin
    deflects minor blows. They attack swiftly with multiple bites in quick succession, then immediately withdraw. They are
    always in groups — a lone drone means the hive is nearby.
