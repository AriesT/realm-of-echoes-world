- id: monster_giant_slug
  name: Гігантський Слизун
  type: beast
  description: Велетенський слизун розміром з бочку. Захищається кислотним слизом.
  full_description: Гігантські слизуни зростають у найвологіших ділянках каналізації. Пасивні доки не потривожити, але у разі
    небезпеки виділяють їдкий кислотний слиз. Навіть зброя ржавіє після контакту з їхніми виділеннями. Їхній ядерний залоз
    — цінний алхімічний компонент, але добути його небезпечно.
  lore_en: Giant slugs grow in the dampest sections of the sewers. Passive until disturbed, they secrete a caustic acid slime
    when threatened. Even weapons corrode after contact with their secretions. Their nucleus gland is a valuable alchemical
    component, but harvesting it is dangerous.
