- id: monster_sewer_rat
  name: Каналізаційний Щур
  type: beast
  description: Великий агресивний щур, що мешкає у темних тунелях каналізації.
  full_description: Каналізаційні щури — найчисленніші мешканці підземних тунелів під Кам'яною Бродею. Вони значно більші
    за своїх міських родичів і не такі боязкі. Поодинці — лише незручність. Зграя — реальна загроза навіть для досвідченого
    мандрівника. Їхні гострі зуби легко прогризають шкіру й тканину. Мисливці за щурами полюють на них заради хвостів і іклів
    — за них платять у крамницях.
  lore_en: Sewer rats are the most numerous inhabitants of the tunnels beneath Stone Ford. They are considerably larger than
    their city cousins and far less timid. Alone they are a mere nuisance; a pack poses a real threat even to experienced
    adventurers. Their sharp teeth easily gnaw through leather and cloth. Rat hunters pursue them for their tails and fangs,
    which fetch coin at local shops.
  image_prompt: Vray render, photo-realistic 3D render of a creature from a dark fantasy MMORPG, underground sewer dungeon
    setting, dramatic lighting. A large grey sewer rat, scarred and aggressive, crouching on wet cobblestones in dark tunnel,
    yellow eyes glowing.
