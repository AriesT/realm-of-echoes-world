- id: monster_troll_warden
  name: Вартовий Троль
  type: giant
  description: Масивний троль, що охороняє перехід у нижні рівні каналізації.
  full_description: 'Тролі каналізації — стародавні мешканці підземель, набагато старіші за саме місто. Вартовий Троль займає
    прохід і нікого не пропускає без «оплати» — шматком їжі або крові. Його регенерація вражаюча: дрібні поранення затягуються
    просто на очах. Вогонь і кислота уповільнюють його відновлення. Коли Троль падає — відбувається не смерть, а сповільнений
    стан відновлення; його треба добити або тікати швидко.'
  lore_en: 'Sewer trolls are ancient inhabitants of the underground — far older than the city itself. The Warden Troll occupies
    a chokepoint and lets no one pass without ''payment'' — food or blood. Its regeneration is impressive: minor wounds close
    before your eyes. Fire and acid slow its recovery. When a Troll falls it does not die outright but enters a slow recovery
    state — it must be finished off or fled from quickly.'
  image_prompt: Vray render, photo-realistic 3D render of a creature from a dark fantasy MMORPG, underground sewer dungeon
