- id: monster_cave_leech
  name: Печерна П'явка
  type: beast
  description: Велика темна п'явка що причаїлась у мілководних ставках підземелля.
  full_description: Печерні п'явки ростуть до тридцяти сантиметрів у довжину і живуть у мілких підземних ставках. Вони абсолютно
    непомітні у темній воді — жертва відчуває їх лише коли вони вже прикріпились. П'явка висмоктує кров поволі — одна атака
    не критична, але кілька одночасно небезпечні. У їхніх мішечках зберігається кров попередніх жертв — алхімічний ресурс.
  lore_en: Cave leeches grow up to thirty centimeters long and live in shallow underground pools. They are completely invisible
    in dark water — prey only feels them once they have attached. A single leech drains blood slowly — one alone is not critical,
    but several simultaneously are dangerous. Their sacs hold blood from previous victims — an alchemical resource.
