- id: monster_hive_queen
  name: Королева Вулика
  type: beast
  description: Жахлива Королева Вулика — праматір рою. Рідкісна, смертоносна, легендарна.
  full_description: Королева Вулика — велетенська комашина матріарх, справжній господар глибин каналізації. Вона рідко рухається
    сама — рій захищає її з усіх боків. Її жало містить паралізуючу отруту, що виводить з ладу навіть найздоровіших бійців
    за секунди. Кажуть, що Королева пам'ятає кожного, хто вбивав її дронів, і мститься роками. Після її смерті весь рій на
    деякий час впадає у паніку — найбезпечніший момент для відступу.
  lore_en: The Hive Queen is the titanic insect matriarch, the true master of the sewer depths. She rarely moves independently
    — the swarm protects her from all sides. Her stinger delivers a paralytic venom that incapacitates even the strongest
    fighters within seconds. It is said the Queen remembers everyone who has killed her drones and takes revenge for years.
    After her death the entire swarm falls into chaos — the safest moment for retreat.
