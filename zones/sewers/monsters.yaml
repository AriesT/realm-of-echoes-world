- id: monster_goblin_shaman
  name: Гоблінський Шаман
  type: humanoid
  description: Гоблінський чарівник у татуюваннях зі слизу. Кидає отруйні заклинання.
  full_description: 'Гоблінські шамани — жерці підземного культу Вічної Слизоти. Вони татуюють тіло слизом магічних равликів,
    що дає їм обмежений магічний захист. Їхні закляття прості, але ефективні: отруйні хмари і ослаблення противника. Шаман
    рідко б''ється сам — він тримається позаду і посилює своїх побратимів. Знищення шамана одразу послаблює всю зграю гоблінів.'
  lore_en: 'Goblin shamans are the priests of the underground Cult of Eternal Slime. They tattoo their bodies with magical
    slug slime, granting limited magical protection. Their spells are simple but effective: poison clouds and enemy weakening.
    A shaman rarely fights directly — he stays behind and empowers his pack-mates. Slaying the shaman immediately weakens
    the entire goblin group.'
