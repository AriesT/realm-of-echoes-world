- id: monster_plague_zombie
  name: Чумний Зомбі
  type: undead
  description: Ожилий труп, вражений стародавньою чумою. Повільний, але невтомний і заразний.
  full_description: У чумній зоні глибоких каналізацій поховані жертви давньої епідемії — але не всі залишились мертвими.
    Чумні зомбі — повільні й кострубаті, але не відчувають болю і продовжують атакувати навіть тяжко поранені. Їхні укуси
    та подряпини несуть ризик зараження чумною лихоманкою. Вогонь очищає від зарази надійніше всього іншого. Добре ж що вони
    не бігають.
  lore_en: In the plague zone of the deep sewers lie the victims of an ancient epidemic — not all of whom stayed dead. Plague
    zombies are slow and shambling, but feel no pain and keep attacking even when gravely wounded. Their bites and scratches
    carry the risk of plague fever infection. Fire cleanses the corruption more reliably than anything else. At least they
    cannot run.
  image_prompt: Vray render, photo-realistic 3D render of a creature from a dark fantasy MMORPG, underground sewer dungeon
