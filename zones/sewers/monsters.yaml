- id: monster_giant_sewer_rat
  name: Гігантський Щур Каналізації
  type: beast
  description: Величезний щур розміром з малого собаку. Агресивний і непередбачуваний.
  full_description: Гігантські щури — мутованіші нащадки звичайних пацюків, що поколіннями жили у зоні магічних відходів.
    Розміром з малого пса, вони атакують без попередження, цілячись у горло. Їхня шкура достатньо товста щоб зупинити легкий
    удар. Де з'явився один гігантський щур — там скоро буде ціла зграя.
  lore_en: Giant rats are mutated descendants of common vermin who spent generations near magical runoff. The size of a small
    dog, they attack without warning, targeting the throat. Their hide is thick enough to deflect a glancing blow. Where one
    giant rat appears, a whole pack will soon follow.
