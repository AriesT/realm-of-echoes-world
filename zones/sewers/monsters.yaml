- id: monster_sewer_slug
  name: Каналізаційний Слизун
  type: beast
  description: Повільний м'якотілий слизун завдовжки з руку. Залишає слизовий слід.
  full_description: Каналізаційні слизуни — неагресивні, але неприємні сусіди. Вони повзають по стінах і підлозі, залишаючи
    блискучий слизовий слід. Мисливці їх збирають заради слизу — алхімічного компонента. Наступити на слизуна у темряві —
    неприємно, але безпечно якщо слизун не пошкоджений.
  lore_en: Sewer slugs are passive but unpleasant neighbors. They crawl along walls and floors leaving a glistening slime
    trail. Hunters collect them for their slime — a useful alchemical component. Stepping on a slug in the dark is unpleasant
    but safe if the slug is undamaged.
