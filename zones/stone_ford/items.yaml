- id: item_stamina_potion
  name: Зілля Витривалості
  description: Темно-зелений відвар що відновлює фізичні сили миттєво.
  full_description: Концентрований відвар з кореня ялівцю, омели і ще дев'яти компонентів рецепт яких Зінія тримає в таємниці. Після ковтка м'язи наповнюються теплом і силою — втома від бою зникає за лічені секунди. Корисний воїнам які вичерпали свої фізичні резерви.
  lore_en: Zinia's recipe has never been written down — she says paper makes secrets fragile. What is known is that juniper root and mistletoe anchor a decoction of eleven ingredients, reduced slowly over two days until the liquid turns the colour of old amber. A single swallow sends warmth flooding through exhausted muscles within moments, pushing fatigue aside like smoke in wind. Warriors who have burned through everything they had call it the difference between walking home and not.
