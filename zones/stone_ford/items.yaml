  name: Смажене М'ясо
  description: Ситний шматок смаженого м'яса — відновлює сили після бою.
  full_description: Добре прожарений шматок оленини або кабанятини, посолений і присмачений польовими травами. Мисливці стверджують що немає кращої їжі після довгого переходу лісом. Відновлює здоров'я і підбадьорює дух.
  lore_en: Thick-cut venison or boar, fire-roasted over hardwood coals and rubbed with salt and wild field herbs before the march. Hunters at Stone Ford swear by the ritual — meat eaten in the open air after a day's tracking tastes unlike anything a tavern kitchen can produce. The fat renders dark at the edges, the flesh stays tender within. A meal that restores more than flesh alone.
