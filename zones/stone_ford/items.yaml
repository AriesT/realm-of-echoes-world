- id: item_leather_vest
  name: Шкіряна Безрукавка
  description: Легкий захист для грудей без обмеження рухливості.
  full_description: Безрукавка з подвійно зшитої вичиненої шкури — улюблений захист розвідників і крадіїв. Достатньо міцна щоб відхилити ковзкий удар клинка, але достатньо легка щоб не заважати безшумному пересуванню. Застібається мідними бляхами по боках.
  lore_en: Double-stitched from tanned cowhide, this vest is the quiet armor of scouts and rogues who cannot afford to be heard. Its cut is close but unrestrictive, built for the crouch and the sprint rather than the shield wall. Copper buckles on the flanks let a wearer cinch it tight or shed it fast — a distinction that has saved more than a few lives on the frontier road.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG armor piece, presented as a standalone item. A sleeveless vest cut from thick tanned cowhide, its surface bearing the warm brown of well-used leather darkened at the shoulders and sides from repeated wear. Double rows of waxed stitching run along every seam, dense and even, the thread slightly paler than the hide. Small copper buckles sit at both flanks, their surfaces dulled and finger-worn from daily use. Scuff marks and faint creasing at the chest reveal honest frontier service — no decoration, only function. Displayed front-facing, laid flat or propped. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
