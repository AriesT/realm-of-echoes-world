- id: item_iron_boots
  name: Залізні Чоботи
  description: Важкі чоботи з залізними пластинами — захист і сила кроку.
  full_description: Чоботи зшиті з щільної шкіри і посилені залізними пластинами на носках і підйомах. Важкі, але надійні — ніяке коріння чи битий камінь не поріже ногу. Удар такого чобота завдає відчутної шкоди противнику.
  lore_en: Heavy frontier footwear built for ground that wants to hurt you — stones, roots, broken timber, and the occasional desperate blade. Thick-soled leather rises to the mid-calf, with iron plates hammered over the toes and insteps and secured by wide iron rivets. They are slow in a sprint and honest about it. Every stone ford guardsman who has held a gate in close quarters knows the value of a properly-delivered kick.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG armor piece, presented as a standalone item. A pair of mid-calf boots constructed from thick dark-brown leather with a heavy flat sole, the leather surface scuffed and trail-worn with pale abrasion marks at the ankles. Flat iron plates are riveted over each toe cap and along the instep, the metal a dull grey with scattered rust spotting and surface pitting from wet-road exposure. Wide iron rivets hold the plates firmly, their heads slightly mushroomed from repeated impacts. Coarse waxed lacing runs up the inner shin, the laces replaced with plain hemp cord. Displayed as a pair, side by side. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
