- id: item_dried_mushroom
  name: Сушений Гриб
  description: Засушений лісовий гриб — їжа і компонент для алхімічних відварів.
  full_description: 'Зінія збирає гриби лише в повний місяць — стверджує що саме тоді вони найсильніші. Висушені на сонці вони зберігають більшість своїх властивостей: деякі відновлюють мана, інші дають бачення, ще інші просто смачні у стравах. Тільки травниця знає які від чого.'
  lore_en: Zinia climbs the ridge paths only on full-moon nights to collect these, and will not explain why to anyone's satisfaction. Spread on reed mats and dried in open air, the caps shrink and darken but hold their properties intact — or so she claims. Some restore the mind's reserves, others bring vivid and unsettling visions, and a few are simply good in a broth. The trick is knowing which is which, and that knowledge belongs to Zinia alone.
