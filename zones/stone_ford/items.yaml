- id: item_wine_goblet
  name: Чаша Вина
  description: Червоне вино з погребів Кам'яної Броді — розкіш для мандрівника.
  full_description: Вино виготовлене з ягід що ростуть на пагорбах за містом. Темно-червоне, з терпким присмаком і легким ароматом сушених фруктів. Шляхетні замовляють пляшками, прості люди — келихами. Відновлює здоров'я і знімає стрес після виснажливого шляху.
  lore_en: Hill-berry wine from the slopes east of Stone Ford — dark garnet in the glass, tannic enough to dry the tongue, with an aftertaste of dried plum and river air. The vintner presses it in autumn and bottles it rough, leaving clarification to time. Nobility orders it sealed; common folk drink it young from a shared cup. A measure of this restores the body and quiets the mind after punishing travel.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG consumable item, presented as a standalone item. A pewter goblet of modest elegance, its surface burnished to a soft satin sheen with a fine turned-ring pattern around the bowl and stem, filled with deep garnet-red wine that catches light with a warm ruby translucence. A thin line of dried wine stains the inner wall just above the current fill, and the metal shows faint tarnish pooling in the decorative grooves — quality craftsmanship with honest use. The wine's surface is still, reflecting a soft highlight, and a faint purple tint bleeds into the meniscus at the rim. The base is slightly flared and stable, suggesting a piece made for a prosperous frontier household rather than a noble hall. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
