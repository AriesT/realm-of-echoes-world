- id: item_mana_crystal
  name: Кристал Мани
  description: Необроблений кристал синьої мани — сховище чистої магічної енергії.
  full_description: Природній кристал утворений у місцях де магічна енергія концентрується протягом сотень років. Всередині видно блакитний пульс — мана живе в ньому. Маги використовують кристали для відновлення власних запасів мани або як компоненти у виготовленні артефактів.
  lore_en: Formed over centuries where magical energy pools in the deep earth, this crystal carries a slow, rhythmic pulse of blue light within its core — mana made tangible. Mages prize them for restoring depleted reserves in the field, and artefact-crafters use them as anchor points for complex enchantments. The pulse never quite syncs with a heartbeat, which unsettles those who hold it too long.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG item, presented as a standalone item. A naturally formed hexagonal crystal roughly the size of a closed fist, tapering to an irregular point at one end, the facets uncut and organic in their geometry. The crystal is deep sapphire blue with an inner luminescence — a slow, gentle pulse of cool azure light visible through the translucent mineral body. The surface has a smooth, glassy quality with faint natural inclusions and growth lines running along the interior. Minor chips along the base edges suggest it was pried from stone rather than carefully extracted. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
