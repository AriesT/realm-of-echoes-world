- id: item_leather_cap
  name: Шкіряна Шапка
  description: М'який шкіряний шолом — легкий захист голови.
  full_description: Шапка з товстої буйволячої шкіри, підбита повстю. Не зупинить пряме рубання мечем, але надійно захищає від ударів кийком, каміння і когтів дрібних звірів. Популярна серед крадіїв і розвідників.
  lore_en: Pressed from thick buffalo leather over a wooden form and lined with folded felt, this cap absorbs the kind of blunt punishment that helmets of harder material would transfer straight to the skull. It will not turn a sword, and makes no claim to — but for the thief rolling off a rooftop or the scout taking a sling-stone, it is exactly enough. Half of Stone Ford's night patrol wears one.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG armor piece, presented as a standalone item. A close-fitting cap formed from thick buffalo leather, its surface a deep chestnut brown darkened to near-black at the crown from oils and handling. The leather is smooth but shows fine compression lines from the forming process and shallow dents from past impacts. A folded felt brim runs around the lower edge, its charcoal-grey color slightly matted with age. A small flat iron rivet marks each temple as modest reinforcement. No decoration breaks the practical silhouette. Displayed upright on its base, looking forward. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
