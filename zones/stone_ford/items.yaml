- id: item_ale_mug
  name: Кухоль Пива
  description: Добре сварене місцеве пиво — підбадьорює і гріє.
  full_description: Темне пиво броварні Волка — густе, трохи гірке, з запахом хмелю. Місцеві кажуть що після кухля Волкового пива навіть найтяжча рана починає боліти менше. Відновлює витривалість і трохи знімає накопичену втому від бою.
  lore_en: Volko's dark brew pours thick and settles with a thin tan head, carrying the bitter perfume of dried hops and roasted barley. Locals have argued for years whether it is the recipe or the water from the stone ford itself that gives it that particular edge. Either way, the mug empties quickly and the ache of a long fight fades faster than it has any right to. Restores stamina and dulls the sharp edge of combat fatigue.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG consumable item, presented as a standalone item. A squat, thick-walled ceramic mug filled with dark amber ale topped by a modest foamy head, the exterior glazed in an uneven earthy brown with faint finger-smudge marks and dried drip stains running down one side. The clay body is sturdy and utilitarian, the handle slightly lopsided from hand-forming, with a small chip worn smooth at the rim's edge. Bubbles cling to the inner walls just below the foam line, and a faint moisture ring marks the base. Every detail speaks to a working tavern — honest, heavy, made to survive rough handling. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
