- id: item_whetstone
  name: Точильний Камінь
  description: Гранітний брусок для заточення клинків у польових умовах.
  full_description: Шматок дрібнозернистого граніту розміром з долоню. Досвідчений воїн завжди тримає точильний камінь при собі — тупий клинок у бою дорівнює смерті. Один камінь витримує сотню заточень. Легкий і компактний.
  lore_en: A palm-sized block of fine-grained granite, worn smooth on both faces from long use. Every experienced warrior keeps one on their belt — a dull edge in a real fight is a liability no amount of skill can fully compensate for. One stone will see a blade through a hundred sharpenings before it is ground too thin to be useful, making it one of the most reliable items a fighter can carry.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG item, presented as a standalone item. A small rectangular whetstone, palm-sized and slightly rounded at the corners from years of use, made from fine-grained pale grey granite with faint darker mineral veining running through it. Both flat faces are smooth and polished from repeated blade passes, with subtle concave wear in the center of the primary sharpening surface. The sides retain the rougher original stone texture, giving a tactile contrast between worked and unworked surfaces. A shallow groove worn along one edge suggests it has been used to sharpen a pointed tip many times. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
