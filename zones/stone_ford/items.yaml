- id: item_crossbow
  name: Арбалет
  description: Механічний лук — точна зброя для тих хто терпеливий.
  full_description: Арбалет складніший у виробництві ніж звичайний лук, але не потребує місяців тренувань щоб стріляти прицільно. Дубовий приклад, сталеве плечо, важільний механізм взведення. Стріла летить далеко і пробиває звичайну шкіряну броню.
  lore_en: Where a longbow demands years of dedicated training, this crossbow demands only the patience to crank its lever and steady hands to aim. The oak stock is fitted with a polished steel prod and a reliable lever-cocking mechanism that any literate soldier can master in an afternoon. At close to medium range, its bolts punch through padded leather and bite into ringmail with unpleasant authority.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG weapon, presented as a standalone item. A well-constructed crossbow with a solid oak stock of deep amber-brown, its surface lightly oiled and showing careful joinery at the tiller with no visible cracks. The steel prod is tempered to a clean blue-grey sheen, mounted securely with wrapped iron binding and slightly curved under tension. The lever-cocking mechanism on the underside is composed of several interlocking steel components, cleanly fitted and showing only minor wear at the pivot points. The nut and trigger assembly are neatly integrated into the stock, the trigger guard fashioned from a single bent iron strip. Displayed diagonally, full length visible. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
