- id: item_iron_gauntlets
  name: Залізні Рукавиці
  description: Кував залізні рукавиці для захисту кистей і кулаків.
  full_description: Важкі залізні рукавиці з гнучкими пластинами на суглобах — стандартне озброєння важкої піхоти. Захищають руки від ударів меча і дозволяють використовувати кулаки як зброю. Виготовлені Гельгою за замовленням міської варти.
  lore_en: Hammered to Helga's exacting standard for the Stone Ford city watch, these gauntlets plate iron over a riveted leather glove, the knuckle articulation allowing a full fist to close without binding. They are not elegant — the iron carries hammer marks and the leather is plain — but they have broken up more tavern brawls than most weapons in the garrison. A kick counts double when the hand that throws the punch is armored.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG armor piece, presented as a standalone item. A pair of heavy iron gauntlets built over a thick leather glove base, the iron plates grey-black with surface scale and faint rust freckling along the edges. Articulated knuckle plates are riveted in overlapping rows with flat iron rivets, the metal showing clear hammer texture from hand-forging. The leather palm and inner cuff are dark brown and stiff, reinforced at stress points with doubled stitching. A narrow iron cuff-band at the wrist bears no engraving — purely utilitarian construction. Displayed as a pair, slightly open, palms up. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
