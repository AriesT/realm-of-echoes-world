- id: item_wool_cloak
  name: Вовняний Плащ
  description: Теплий плащ з грубої вовни, захищає від холоду і дощу.
  full_description: Плащ зітканий із густої вовни місцевих овець, просочений жиром для водовідштовхування. Зберігає тепло навіть у мокрому стані — незамінна річ для подорожей крізь осінній ліс і нічну варту. Капюшон досить великий щоб закрити обличчя.
  lore_en: Woven from the dense fleece of upland sheep and rubbed with rendered fat to shed rain, this cloak keeps its warmth even after hours in wet woodland. The hood is generously cut, wide enough to shadow the whole face when pulled low. It smells faintly of lanolin and woodsmoke — the honest scent of every night watch on the Stone Ford perimeter.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG armor piece, presented as a standalone item. A heavy full-length cloak woven from dense undyed wool in a tight twill weave, its color an uneven oatmeal-grey with natural flecks of dark fiber throughout. The surface has a slightly felted, napped texture from repeated exposure to damp and heat. The deep hood is folded forward, its inner lining a slightly warmer cream-brown. Hem edges show light fraying and a faint waterline stain at the bottom from muddy trail travel. A simple bone toggle and loop closure fastens the neck. Displayed front-facing, laid flat or propped. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
