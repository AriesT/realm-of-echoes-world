- id: item_silver_necklace
  name: Срібне Намисто
  description: Витончене срібне намисто — захист і елегантність водночас.
  full_description: Срібне намисто тонкого плетіння, з невеликою підвіскою у формі крапельки. Ювелір Саффіро стверджує, що кожна ланка вручну відполірована — і це помітно в тому як воно виблискує навіть при слабкому освітленні. Легка магічна обробка надає власнику незначний захист.
  lore_en: Each link of this fine silver chain was polished by hand before Saffiro's apprentice assembled them — a point the jeweler makes without prompting. The small teardrop pendant catches light from angles that plain silver should not, hinting at the subtle warding treatment worked into the metal. It is more than decoration and less than armor, which makes it exactly right for those who move in uncertain company.
