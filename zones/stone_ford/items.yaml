- id: item_spear
  name: Бойовий Спис
  description: Довге древко зі сталевим вістрям — класична зброя піхоти.
  full_description: Спис — зброя, яка пройшла крізь сотні битв і залишилась незмінною. Сталеве вістря на міцному ясеневому держаку дозволяє тримати ворога на відстані. Особливо ефективний проти кінноти і великих звірів — вовки і кабани не можуть наблизитись раніше ніж відчують сталь.
  lore_en: Soldiers have carried this weapon for a thousand years because nothing else keeps a charging enemy at bay so effectively. The leaf-shaped steel tip is forged thick at the socket and tapers to a narrow, punishing point, mounted atop a seasoned ash shaft nearly two meters long. It has slain beasts, broken cavalry charges, and held line formations across generations of frontier conflict.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG weapon, presented as a standalone item. A full-length battle spear with a leaf-shaped steel spearhead approximately twenty centimeters long, the blade double-edged with a strong central ridge and a thick reinforced socket wrapped with iron binding wire. The steel head is a cold gunmetal grey with minor surface scuffs and faint oxidation along the socket seam. The shaft is straight-grained ash, slightly pale tan with a smooth hand-worn finish along the grip section and small dings and scrapes along its length from field use. The base of the shaft ends in a plain iron butt-cap, dented but intact. Displayed diagonally, full length visible. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
