- id: item_fishing_rod
  name: Вудочка
  description: Проста бамбукова вудочка з волосяною леськом — для риболовлі на річці.
  full_description: Гнучке бамбукове вудилище, волосяна ліска і простий залізний гачок. Мирошник Степан сам робить такі для продажу — він риболов з досвідом і каже що у тихій заводі під млином завжди водяться великі окуні. Потрібна навичка Рибалки щоб використовувати ефективно.
  lore_en: Crafted by Miller Stepan from a straight bamboo cane with a length of hair line and a plain iron hook, this rod is the work of a man who fishes more than he mills. Stepan insists that the deep, quiet pool beneath the mill wheel holds the largest perch in the region, and his rods have a proven reputation among those patient enough to wait for them. Effective use requires a practised hand.
  image_prompt: 'Vray render, photo-realistic 3D render of a single low-tier starter MMORPG item, presented as a standalone item. A slender fishing rod of pale golden bamboo, roughly two meters long and gently tapering from a thick grip end to a fine, flexible tip. The cane surface is smooth with natural internodal rings at regular intervals, slightly worn at the handle from repeated gripping. A length of pale hair line is wound neatly around the upper section and trails off to a small, plain iron hook — dark and unadorned, the tip slightly corroded from river use. The rod has the honest, functional character of a working man''s tool: no decoration, no lacquer, just well-selected cane. Displayed diagonally, full length visible. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.'
