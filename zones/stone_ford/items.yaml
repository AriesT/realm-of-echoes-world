- id: item_copper_ring
  name: Мідне Кільце
  description: Проста мідна каблучка — перший крок ювелірного мистецтва.
  full_description: Кільце виковане з чистої міді руками місцевого ювеліра. Невибагливе але якісне, відполіроване до блиску. Носять як прикрасу або як знак приналежності до певного ремісничого цеху.
  lore_en: Cast and finished by the local jeweler from a single pour of pure copper, this ring is modest in form but sound in craft. The band is rounded and even, polished to a warm ruddy gleam. In Stone Ford it serves equally as personal ornament and as a discreet sign of guild affiliation — the metal itself carrying more meaning than its price might suggest.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG armor piece, presented as a standalone item. A plain wide-band ring cast from pure copper, its surface polished to a warm reddish-gold sheen with fine circular buff marks still faintly visible from finishing. The band is rounded in cross-section and even in width, with no stone setting or engraving — only smooth unbroken metal. Faint natural patina has begun to gather in the inner curve, a soft greenish tint that deepens the color contrast. The outer surface catches light cleanly, the copper bright and honest. Displayed resting on a small worn stone pedestal. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
