- id: item_hunting_knife
  name: Мисливський ніж
  description: Гострий ніж для полювання і виживання в лісі.
  full_description: Цей ніж виготовлений майстром для мисливців Темного Лісу. Широке вигнуте лезо ідеально підходить для обробки туші і різки шкури, але при потребі стане смертоносною зброєю. Руків'я вирізане з оленячого рогу, що не ковзає навіть у вологих руках.
  lore_en: Made for the hunters who work the edges of the Dark Forest, this knife earns its keep long before any fight begins. The wide, slightly curved blade is ground for skinning and hide-work, but the same edge that dresses a buck can open a throat with equal efficiency. The handle, carved from a single piece of deer antler, is warm in the hand and holds firm even when slicked with blood and rain.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG weapon, presented as a standalone item. A sturdy hunting knife with a wide, gently curved single-edged blade approximately twenty-five centimeters long, forged from dark iron with a slight clip-point tip suited for field dressing. The blade surface shows faint staining and minor pitting near the spine, the edge itself cleanly maintained but showing fine use marks consistent with outdoor work. The handle is carved from pale cream deer antler, its natural surface texture left largely intact — ridged, slightly waxy, with subtle brown marbling through the material. A simple iron bolster separates blade from handle, darkened with age and light surface rust at its seams. Displayed diagonally, full length visible. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
