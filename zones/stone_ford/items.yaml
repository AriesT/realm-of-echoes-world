- id: item_healing_herb_bundle
  name: Пучок Цілющих Трав
  description: В'язка свіжих лікувальних трав зібрана травницею Зінією.
  full_description: Пучок із п'яти-семи видів цілющих трав зібраних на світанку — тільки тоді вони мають максимальну силу, каже Зінія. Тут є материнка, звіробій, деревій і ще кілька трав що місцеві не вміють розпізнати на вигляд. Жують сирими або заварюють чай.
  lore_en: Gathered at first light when the dew still clings, these five to seven herb varieties are bundled with rough twine by Zinia's own hand. Yarrow for bleeding, St. John's wort for fever, oregano for infection — and a few stems no one in town has bothered to name. The bundle can be chewed raw in the field or steeped into a bitter tea when time allows. Potency fades quickly; Zinia replaces unsold stock at each dawn.
