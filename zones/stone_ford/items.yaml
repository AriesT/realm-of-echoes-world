  name: Сувій Льодяного Шипа
  description: 'Одноразовий сувій: пронизуюча льодяна стріла.'
  full_description: Закляття льоду записане Вандораком на пергаменті просоченому водою з льодяного джерела на північ від Броді. При використанні з руки мага злітає крижана голка що пронизує більшість обладунків завдяки точності і швидкості. Особливо ефективна проти істот вогню — магія протилежних стихій.
  lore_en: Written on parchment soaked in water drawn from an icy spring north of Stone Ford, this scroll carries Vandorak's ice needle spell in dormant form. When the words are spoken, a slender shard of conjured ice launches from the caster's hand with enough force and precision to punch through most armour. It is especially devastating against fire creatures, where opposing elemental forces amplify the strike beyond ordinary measure.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG consumable item, presented as a standalone item. A tightly rolled scroll of pale, slightly translucent parchment — the material soaked in cold spring water during preparation, giving it a crisp, faintly waxy texture and an almost bluish-white tone. It is tied with a thin silver-blue cord and partially unrolled, revealing runic script inscribed in pale icy blue and silver ink that seems to catch the light with a faint frost-shimmer. Tiny ice crystal formations have formed along the edges of the parchment where moisture has frozen into the fibers, giving the scroll a delicately frosted border. The script is precise and calm — cold intelligence rendered in ink. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
