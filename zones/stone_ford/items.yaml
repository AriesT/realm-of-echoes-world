- id: item_short_sword
  name: Короткий меч
  description: Надійний прямий клинок для ближнього бою.
  full_description: Короткий меч — стандартне озброєння вартових і солдатів по всьому краю. Кований із добротного заліза, він не такий довгий як лицарський меч, але значно зручніший у вузьких коридорах і тісних сутичках. Леза заточені з обох боків, руків'я обмотане міцною шкірою.
  lore_en: A straight iron blade issued to guards and militia across the frontier, worn smooth by years of daily carry. Shorter than a knight's sword, it was never meant for ceremony — only for the cramped corridors of garrison halls and the sudden violence of border roads. The double-edged blade holds a serviceable edge, and the leather-wrapped hilt has darkened with sweat and use.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG weapon, presented as a standalone item. A straight double-edged iron short sword, roughly fifty centimeters in length, with a modest cruciform crossguard of plain mild steel. The blade is a dull grey-iron tone, showing faint surface scratches and light discoloration along the fuller from repeated sharpening. The hilt is wrapped tightly in dark brown leather strips, worn smooth and slightly compressed from prolonged grip, secured at top and bottom with thin iron wire. No ornamentation is present — the construction is purely functional, every surface carrying the honest marks of frontier service. Displayed diagonally, full length visible. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
