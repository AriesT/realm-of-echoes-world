  name: Сира Шкіра
  description: Необроблена шкура звіра — потрібна для виготовлення шкіряних виробів.
  full_description: 'Свіжознята шкура великого звіра — вовка, кабана або оленя. У такому стані вона непридатна для використання: занадто жорстка і швидко псується. Потрібно передати кожум''яці Берті яка обробить її спеціальним розчином.'
  lore_en: Freshly stripped from a wolf, boar, or deer felled in the wilds beyond Stone Ford's walls. The hide is still stiff with dried blood along the edges, and will rot within days if left untreated. Tanner Berta is the only one in town who knows how to cure it properly — bring it to her before the smell draws trouble.
