- id: item_cloth_robe
  name: Полотняний Балахон
  description: Просторий балахон мага — мінімальний захист, максимум зосередженості.
  full_description: Широкий балахон зшитий з льону — традиційне вбрання учнів магії і чаклунів. Сам собою не захищає від ударів, але спеціальний крій не заважає жестикуляції і концентрації магічної енергії. Зашиті кишені дозволяють носити свитки і кристали завжди під рукою.
  lore_en: Cut from undyed linen in the wide-sleeved style favored by magic academies, this robe prioritizes freedom of movement over any pretense of armor. The hidden pockets sewn into each inner panel were no afterthought — they hold a scroll tight and a crystal safe without a telltale bulge. An apprentice's first robe, worn until the fabric knows the shape of its owner.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG armor piece, presented as a standalone item. A long loose-fitting robe sewn from natural undyed linen, its color a pale off-white with a faint warm undertone from repeated washing. The weave is plain and even, with wide draping sleeves that taper gently at the cuff. Subtle wear appears at the collar edge and hem, where the fabric has softened and thinned from use. A narrow woven sash of slightly darker cream wraps the waist. The inner lining shows the discreet flat seams of hidden pocket panels on both sides. Displayed front-facing, laid flat or propped. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
