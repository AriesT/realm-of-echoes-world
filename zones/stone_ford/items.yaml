  name: Вичинена Шкіра
  description: Оброблена шкіра — готова до пошиття одягу і обладунків.
  full_description: Шкіра після обробки набирає характерного темно-коричневого кольору і стає гнучкою та довговічною. Берта використовує комбінацію танінів з дубової кори і спеціального жиру — її метод передано від бабці. З однієї шкури виходить достатньо матеріалу для пошиття жилета або чобіт.
  lore_en: Processed through Berta's time-honoured method of oak bark tannins and rendered fat, the hide has transformed into something supple and enduring. Its surface carries the warm, characteristic dark brown of well-cured leather, faintly aromatic with oak and animal oil. A single hide yields enough material for a vest or a sturdy pair of boots — the honest foundation of a frontier craftsman's trade.
