- id: item_lockpick
  name: Відмичка
  description: Тонкий сталевий інструмент для відкривання замків без ключа.
  full_description: Набір із трьох відмичок різного профілю — для простих, середніх і складних замків. Виготовлені з загартованого дроту майстром якого ніхто не бачив в обличчя. Продаються в злодійському провулку за ціною що не запитують. Зберігання таких інструментів незаконне — варта має право на обшук.
  lore_en: A slim leather roll containing three picks of distinct profiles, each hardened wire bent to a precise geometry for simple, medium, and complex locks. No one in Stone Ford has met the craftsman who makes them — they appear in the alley, already paid for. The watch has the right to search on suspicion alone, which means ownership is a quiet matter of calculation.
  image_prompt: 'Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG item, presented as a standalone item. A small rolled leather case, tied with a thin cord, partially unrolled to reveal three slim metal lockpicks nestled in individual stitched pockets. Each pick is made from dark hardened wire with a wooden handle grip wrapped in linen cord — the tips bent into distinct profiles: a single hook, a rake, and a diamond point. The leather case is oiled dark brown, soft and well-kept despite its illicit purpose, with subtle wear at the corners from being hidden and retrieved often. The metal picks have a dull grey sheen, polished smooth at the tips from use. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.'
