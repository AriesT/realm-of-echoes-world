- id: item_scroll_fireball
  name: Сувій Вогняної Кулі
  description: Одноразовий магічний сувій що дозволяє застосувати закляття навіть без навички.
  full_description: Пергамент вкритий рунами Вандорака чітким почерком. При розгортанні і читанні слів вголос виникає вогняна куля що вражає ціль на відстані до двадцяти кроків. Сувій розсипається в попіл після одного використання. Ефективна проти нежиті і замерзлих цілей — подвоює шкоду.
  lore_en: Covered in Vandorak's precise runic script, this scroll holds a single discharge of fire magic ready to be triggered by voice. Reading the words aloud sends a fireball streaking toward the target up to twenty paces distant — the scroll itself turns to ash the moment the spell releases. Against undead or ice-locked foes the damage is particularly severe, making these scrolls a prized commodity for anyone venturing into cold crypts.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG consumable item, presented as a standalone item. A tightly rolled scroll of aged parchment, tied with a short length of red cord, partially unrolled to reveal dense lines of runic script inscribed in deep crimson and black ink. The parchment is warm ochre in tone, slightly stiff, with faint scorch-marks along both edges where proximity to the spell's latent heat has singed the surface over time. The runes are precise and deliberate — the hand of an experienced mage — each symbol cleanly formed with fine-tipped quill strokes. A faint heat shimmer seems to hover near the surface of the script. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
