- id: item_enchanting_dust
  name: Чарівний Порошок
  description: Світлистий порошок що слугує основою для магічного зачарування предметів.
  full_description: Порошок отримується перетиранням кристалів концентрованої магічної енергії. Мерехтить блакитним у темряві і злегка пахне озоном після грози. Вандорак використовує його для нанесення рун на магічні предмети — без цього порошку жодне зачарування не тримається більше кількох годин.
  lore_en: Ground from crystals of concentrated magical energy, this fine powder shimmers with a cold blue light in darkness and carries the sharp, clean scent of air after a lightning strike. Vandorak measures it out by the pinch, using it to inscribe the runic bonds that hold enchantments in place. Without it, even the most carefully worked spell unravels within hours — it is the mortar between magic and matter.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG item, presented as a standalone item. A small open glass vial sealed with a cork stopper, filled with fine luminous powder that shimmers with a soft cerulean and pale violet inner glow. The dust catches the light and scatters it in tiny prismatic sparks, the individual grains too fine to distinguish individually. The glass is smooth and clear, of modest frontier craftsmanship — slightly uneven at the base, hand-blown rather than manufactured. A faint bluish haze clings to the inside surface of the vial above the powder line, as though the dust breathes light. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
