- id: item_candle
  name: Свічка
  description: Воскова свічка — незамінна в темних підземеллях і похмурих ночах.
  full_description: Виготовлена Ірмою зі свіжого бджолиного воску — горить рівно і довго, не диміть і не тхне. Одна свічка горить шість годин. Незамінна для освітлення темних місць і релігійних обрядів. Деякі також кажуть що свічковий вогонь відлякує нечисть.
  lore_en: Hand-poured by Irma from pure beeswax, this candle burns with a steady, smokeless flame for a full six hours. It is a staple of dark cellars, midnight prayers, and cautious descents into places where torches draw too much attention. Some old hands swear that candlelight keeps minor undead at a distance — Irma neither confirms nor denies it, but she sells plenty to those who ask.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG item, presented as a standalone item. A single pillar candle of hand-poured beeswax, roughly fifteen centimeters tall and slightly irregular in its cylindrical form — the marks of a simple mold visible along the sides. The wax is a warm natural amber-gold color, semi-translucent near the top where the wick is set, with a faint honeyed sheen across the smooth surface. The base shows a small flattened drip pool where hot wax was set to cool, and a slight texture variation runs vertically where the pour was not perfectly even. The wick is braided linen, lightly carbonized at the tip from previous lighting. Neatly presented for viewing. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
