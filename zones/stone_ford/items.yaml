- id: item_iron_ingot
  name: Залізний Злиток
  description: Очищений і відлитий залізний злиток — основа ковальського ремесла.
  full_description: Злиток чистого заліза вагою в кілограм. Виплавлений з руди що привозять з гірських шахт на північ від міста. Гельга купує їх партіями у гірничодобувних купців і зберігає в кузні. Основний матеріал для виготовлення зброї і обладунків.
  lore_en: Smelted from ore hauled down from the mountain mines north of Stone Ford, this one-kilogram bar of iron is the raw currency of the smithy. Helga purchases them by the cartload from mining merchants and stacks them along the forge wall, ready to be shaped into blades, buckles, and armour. Everything in town that cuts, guards, or holds together likely began as one of these.
