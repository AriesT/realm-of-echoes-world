  name: Аметистовий Перстень
  description: Срібний перстень з аметистом — підсилює магічну концентрацію.
  full_description: Срібний перстень із вставленим аметистом незвичайного фіолетового відтінку. Каміння добуто в гірських шахтах далеко на північ і привезено торговцями. Аметист здавна вважається каменем мудрості і магії — носячи його, маги відчувають що їхні заклинання даються їм легше.
  lore_en: The stone came down from the northern mountain shafts in a trader's belt pouch, its color too deep and even for the usual mountain amethysts — almost violet-black at the center, brightening to clear lilac at the edge. Saffiro set it in fine silver, leaving the pavilion open so no metal obscures the depth. Mages who wear it report a certain clarity, as though the stone listens before they cast.
