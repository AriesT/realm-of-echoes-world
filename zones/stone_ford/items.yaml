- id: item_hand_axe
  name: Рубаний топір
  description: Важкий однорукий топір — зброя лісорубів і ополченців.
  full_description: Топір важкий, грубо кований — такий самий, яким лісоруби рубають дерева вранці і захищають свій табір вночі. Сталеве лезо насаджене на товсте ясеневе держак. Не відрізняється витонченістю, але один удар ним може зупинити навіть великого звіра.
  lore_en: By dawn it splits firewood; by dusk it splits skulls — the hand axe makes no distinction and requires none. The broad steel head is wedge-ground for splitting force rather than finesse, mounted on a thick ash haft that absorbs the shock of heavy blows. It is the weapon of woodcutters pressed into service, and there is nothing elegant about the damage it inflicts.
  image_prompt: Vray render, photo-realistic 3D render of a single low-tier starter MMORPG weapon, presented as a standalone item. A compact one-handed axe with a broad, wedge-shaped steel head showing a wide beard and a blunt poll, the cutting edge slightly nicked and re-ground multiple times leaving an uneven but sharp profile. The steel is a cold blue-grey with visible hammer marks near the eye and faint rust spotting along the cheek. The haft is straight-grained ash wood, pale tan with a slightly rough texture, wrapped near the base in a single strip of weathered leather thong to prevent slippage. The eye-to-edge construction is purely utilitarian — no engraving, no finish, just iron and wood fitted hard against each other. Displayed diagonally, full length visible. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
