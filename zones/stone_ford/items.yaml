  description: Нейтралізує більшість відомих отрут і зупиняє їх дію.
  full_description: 'Прозора рідина з легким жовтуватим відтінком — продукт складної алхімічної реакції що вимагає точності і терпіння. Нейтралізує більшість природних отрут: павукову, зміїну, грибну. Проти магічних отрут менш ефективна.'
  lore_en: The reaction that produces this clear fluid requires three hours of steady heat and a steady hand — a single wrong measure turns it useless at best, dangerous at worst. The faint yellow cast comes from the binding agent, not impurity. Against spider toxin, viper venom, and common poisonous fungi it works swiftly and without fail. Magical poisons are another matter; they answer to different laws.
