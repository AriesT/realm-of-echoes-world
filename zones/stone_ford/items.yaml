- id: item_mage_quarterstaff
  name: Посох Чаклуна
  description: Посилений деревний посох з вкрапленим кристалом мани.
  full_description: Посох виготовлений з древнього дерева що росте лише в місцях концентрації магічної енергії. На верхівці вправлено необроблений кристал синьої мани — він не просто прикраса, але резонатор що підсилює заклинання. В умілих руках мага цей посох здатен спрямовувати силу розрядів значно ефективніше.
  lore_en: The wood of this staff was taken from groves that grow where ley lines surface, their grain twisted by decades of ambient magical pressure. Set into its crown is a raw blue mana crystal, uncut and humming faintly, which acts as a resonator that narrows and amplifies the wielder's spellwork. In untrained hands it is merely a sturdy walking staff; in a mage's hands it becomes an extension of intent itself.
  image_prompt: Vray render, photo-realistic 3D render of a single mid-tier quality MMORPG weapon, presented as a standalone item. A tall two-handed quarterstaff of dark, slightly twisted hardwood, its surface a deep walnut-brown with a fine natural grain that spirals subtly along the shaft — the result of growth near magical energy concentrations. The wood has been lightly polished but not lacquered, allowing the irregular grain and faint knot patterns to remain visible. At the crown, a raw blue mana crystal is set into a forked iron mounting, the crystal uncut and asymmetric, emitting a soft cool blue inner glow that casts faint light onto the surrounding wood and iron. Iron reinforcing bands are fitted at intervals along the staff, oxidized to a dark charcoal tone that complements the wood. Displayed diagonally, full length visible. The background is a clean, gentle gradient of soft cream and pale amber with a subtle vintage paper texture. Soft, diffused lighting focused on material textures and surface details. Shallow depth of field, slight vignette.
