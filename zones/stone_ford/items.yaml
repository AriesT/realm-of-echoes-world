- id: item_wolfs_bane
  name: Вовчабій
  description: Отруйна рослина з жовтими квітками — відлякує вовків і слугує компонентом для зілля.
  full_description: Висока рослина з яскраво-жовтими квітами. Її запах ненависний вовкам — розкладений на стежці він може відігнати зграю. В правильній концентрації є потужним компонентом для зілля проти нежиті. У великих дозах смертельно отруйний — поводитись з обережністю.
  lore_en: A tall-stemmed plant bearing clusters of vivid yellow flowers, its scent sharp and acrid enough to turn the stomach of any wolf. Scattered along a trail it can disperse an entire pack, and in measured doses it serves as a potent component in anti-undead preparations. Handle it carefully — in large quantities the same properties that drive off predators will kill a man just as effectively.
