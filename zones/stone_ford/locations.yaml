- id: location_stone_bridge
  name: Кам'яний Міст
  district_id: district_stone_ford
  description: Старий кам'яний міст через Мутницю — вузький але надійний.
  full_description: Міст збудований ще до заснування міста і дав йому частину назви. Вузький — два вози не роз'їдуться — але
    витримує будь-яке навантаження. Під ним завжди чутна течія Мутниці. З мосту відкривається гарний вид на мельницю і набережну.
  lore_en: The bridge was built before the town was founded and gave it part of its name. Narrow — two carts can't pass —
    but bears any load. The Muddy River can always be heard flowing beneath. From the bridge there's a nice view of the mill
    and embankment.
