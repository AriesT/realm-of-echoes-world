  full_description: Зінія доглядає цей сад тридцять років — тут ростуть рослини з усього краю і навіть кілька екзотичних з
    півдня. Між грядками є невеликий дерев'яний стіл де вона прийомає відвідувачів. Продає свіжі і сухі трави, навчає Травництву
    і дає поради щодо зілля.
  lore_en: Zinia has tended this garden for thirty years — it contains plants from across the region and even a few exotic
    ones from the south. A small wooden table between the beds is where she receives visitors. Sells fresh and dried herbs,
    teaches Herbalism and gives advice on potions.
