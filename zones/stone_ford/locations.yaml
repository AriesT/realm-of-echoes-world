- id: location_town_gate
  name: Міська Брама
  district_id: district_stone_ford
  description: Масивна кам'яна брама — вхід до Кам'яної Броді з південного тракту.
  full_description: Дві вежі з тесаного каменю стоять по боках від воріт — їх збудували сто років тому коли місто ще боялось
    нападів. Зараз вартові дрімають у будках, але ворота все одно зачиняють на ніч. Повз браму проходять купці, мандрівники
    і вози з лісом — потік ніколи не вщухає вдень. За воротами починається Головна Вулиця що веде до Ринкової Площі.
  lore_en: Two carved stone towers flank the gate — built a hundred years ago when the town still feared raids. Guards doze
    in their booths now but gates still close at night. Merchants, travellers and timber carts flow through constantly. Beyond
    the gate, the Main Street leads to Market Square.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A massive stone
    town gate with two flanking towers, iron portcullis raised, guards in simple armour, busy midday foot traffic, carved
    stone with moss.
  type: outdoor
  is_safe: true
  open_hours:
    mode: always
  _zone: stone_ford
- id: location_craftsmen_quarter
  name: Ремісничий Квартал
  district_id: district_stone_ford
  description: Вулиця майстерень де цілодобово чути молоти, пили і тканські верстати.
  full_description: Вузька брукована вулиця з рядами майстерень — ковальні, столярні, кравецькі і гончарні. Повітря тут завжди
    пахне тирсою, розпеченим залізом і фарбою. Майстри знають один одного роками і тримаються разом — чужинців приймають насторожено
    поки не доведуть свою корисність.
  lore_en: A narrow cobbled street lined with workshops — smithies, carpentry, tailoring and pottery. The air always smells
    of sawdust, hot iron and dye. Masters have known each other for years and stick together — outsiders are received warily
    until they prove their usefulness.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A narrow medieval
    street lined with active workshops, smoke from a smithy chimney, sawdust on cobblestones, craftsmen working in open doorways,
    warm morning light.
  type: outdoor
  is_safe: true
  open_hours:
    mode: always
  _zone: stone_ford
- id: location_river_promenade
  name: Набережна
  district_id: district_stone_ford
  description: Мощена набережна вздовж Мутниці — місце прогулянок і рибальства.
  full_description: Кам'яна набережна тягнеться вздовж берега Мутниці — річки яка дала місту другу половину назви. Тут відпочивають
    ремісники після робочого дня, рибалки перевіряють снасті, а торговці домовляються про доставку товарів вниз за течією.
    Вранці тут стелиться туман і чути кряканів качок.
  lore_en: A stone embankment running along the Muddy River — the waterway that gave the town its second name. Craftsmen rest
    here after work, fishermen check their tackle, and traders negotiate downstream deliveries. In the morning, fog rolls
    in and ducks are heard.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A stone riverside
    promenade along a calm river in morning mist, fishermen at the water's edge, moored wooden boats, weeping willows, cobbled
    path.
  type: outdoor
  is_safe: true
  open_hours:
    mode: always
  _zone: stone_ford
- id: location_noble_quarter
  name: Шляхетський Квартал
  district_id: district_stone_ford
  description: Широкі вулиці і кам'яні будинки заможних мешканців та купців.
  full_description: На північ від Ринкової Площі розташовані будинки заможних людей Кам'яної Броді — купців, колишніх вояків
    і спадкових землевласників. Будинки тут з тесаного каменю а не дерева, вулиці ширші і чистіші. Слуги підмітають їх щоранку.
    Городяни з Бідного Кварталу сюди без справи не ходять.
  lore_en: North of Market Square lie the homes of Stone Ford's wealthy — merchants, former soldiers and hereditary landowners.
    Houses here are carved stone rather than wood, streets are wider and cleaner. Servants sweep them every morning. Townsfolk
    from the Poor Quarter don't wander here without business.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. Wide clean medieval
    street with two-story stone merchant townhouses, flower boxes in windows, a servant sweeping steps, horse-drawn carriage
    passing.
  type: outdoor
  is_safe: true
  open_hours:
    mode: always
  _zone: stone_ford
- id: location_poor_quarter
  name: Бідний Квартал
  district_id: district_stone_ford
  description: Тісні провулки де живуть наймити, поденники і ті кому не пощастило.
  full_description: Тісні криві провулки на захід від Ринкової Площі де тулиться більша частина населення Кам'яної Броді.
    Будинки тут дерев'яні і стоять впритул один до одного, між ними мотузки з висохлим одягом. Вночі краще не ходити без ліхтаря
    — хоча Злодійський Провулок і далі, нічні прогулянки тут небезпечні.
  lore_en: Narrow winding alleys west of Market Square where most of Stone Ford's population crowds. Houses here are timber
    and packed tight together, clotheslines of drying laundry between them. At night, don't walk without a lantern — although
    Thief's Alley is further in, night walks here are risky.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. Narrow muddy
    alley between crowded timber buildings, laundry on lines between them, a child playing in the mud, a dog sleeping by a
    door, overcast sky.
  type: outdoor
  is_safe: true
  open_hours:
    mode: always
  _zone: stone_ford
