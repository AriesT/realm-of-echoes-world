  description: Похмура кам'яна вежа де тримають злочинців і чекають вироку.
  full_description: Товсті стіни без вікон, важка залізна брама і завжди два вартові при вході. Вежа стоїть окремо від інших
    будівель — щоб крики не заважали городянам. Злочинці чекають тут вироку судді або поки хтось заплатить їх викуп. Всередині
    темно, вогко і завжди смердить.
  lore_en: Thick walls without windows, a heavy iron gate and always two guards posted at the entrance. The tower stands apart
    from other buildings — so screams don't disturb townsfolk. Criminals wait here for the judge's verdict or until someone
