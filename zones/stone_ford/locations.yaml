  full_description: Башта з темного каменю що стоїть на невеликому пагорбі в Шляхетському Кварталі. Вандорак живе тут вже
    двадцять років і ніхто не пам'ятає звідки він. Продає магічні свитки, кристали і зілля. Також навчає базових бойових заклять
    тих хто може заплатити його ціну. На вершині вежі, кажуть, горить вічне синє полум'я.
  lore_en: A dark stone tower on a small hill in the Noble Quarter. Vandorak has lived here twenty years and no one remembers
    where he came from. Sells magical scrolls, crystals and potions. Also teaches basic battle spells to those who can pay
    his price. On top of the tower, they say, an eternal blue flame burns.
