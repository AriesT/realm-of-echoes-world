- id: location_apothecary
  name: Аптека
  district_id: district_stone_ford
  description: Аптека Зінії де продаються трави, зілля і медичні приналежності.
  full_description: Це не просто крамниця — Зінія приймає хворих і надає першу допомогу. На полицях сотні склянок і пакетиків
    з травами, порошками і рідинами. Продає лікувальні трави, зілля здоров'я і витривалості, а також навчає Травництву охочих.
  lore_en: More than a shop — Zinia receives the sick and provides first aid. Hundreds of jars and packets of herbs, powders
    and liquids line the shelves. Sells healing herbs, health and stamina potions, and teaches Herbalism to the willing.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. Inside an apothecary,
    shelves of glass jars filled with dried herbs and coloured liquids, mortar and pestle on the counter, bundles of herbs
    hanging from the ceiling.
