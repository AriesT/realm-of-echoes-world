  name: Млин
  district_id: district_stone_ford
  description: Водяний млин Степана на Мутниці — мелять зерно і продають борошно.
  full_description: Млин стоїть на виступі берега де течія найшвидша — колесо крутиться майже цілодобово. Степан Мельник мелить
    зерно для всього міста і навколишніх сіл. Продає борошно, крупу і висівки. Каже що найкращі окуні ловляться в тихій заводі
    прямо під колесом.
  lore_en: The mill stands on a bank spur where the current is fastest — the wheel turns almost round the clock. Miller Stepan
    grinds grain for the whole town and surrounding villages. Sells flour, groats and bran. Claims the best perch are caught
    in the quiet pool right under the wheel.
