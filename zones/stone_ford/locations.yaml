- id: location_tannery
  name: Кожум'ятня
  district_id: district_stone_ford
  description: Кожум'ятня Берти — тут перетворюють сировину на добру шкіру.
  full_description: Важкий запах кожум'ятні відчувається ще за квартал — про це Берта каже без сорому. Свіжа шкура потрапляє
    сюди з бійні і мисливців і через тижень виходить вичиненою, м'якою і готовою до роботи. Берта приймає сиру шкіру і продає
    вичинену — а також готові шкіряні пояси і ремені.
  lore_en: The heavy smell of the tannery reaches a block away — Berta says so without shame. Fresh hides arrive from the
    slaughterhouse and hunters and leave a week later tanned, soft and work-ready. Berta buys raw hides and sells tanned leather
    — as well as finished leather belts and straps.
