- id: location_blacksmith_shop
  name: Кузня Гельги
  description: Найкраща кузня в Кам'яній Броді. Господиня Гельга кує зброю і броню, яким немає рівних у окрузі.
  full_description: 'Кузня Гельги — пекляче гаряче, але неймовірно ефективне підприємство. Господиня Гельга Бронзовоока —
    дварф за походженням, але вже тридцять років живе в Кам''яній Броді. Її ковальські роботи відомі далеко за межами міста:
    зброя б''є гостро, броня тримає удар. У кузні постійно гуркотять молоти, виє хутро і пахне розпеченим металом і вугіллям.
    Гельга завжди готова продати готовий товар або взяти замовлення на виготовлення спеціального спорядження для пригодників,
    що мають достатньо золота і терпіння.'
  lore_en: Helga's Forge is the finest smithy in Stone Ford run by dwarf-born Helga Bronze-Eye, thirty years a local. Her
    weapons strike true and her armour holds firm. The forge rings with hammer blows, bellows roar and the smell of hot metal
    fills the air. Helga sells ready stock or accepts custom orders for adventurers with enough coin.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A fantasy blacksmith
    forge interior, wide establishing shot. A massive stone forge dominating the far wall, blazing orange fire illuminating
    the dark interior. Heavy iron anvil on a thick wooden block in the centre, tongs and hammers hanging on the walls. Racks
    of finished weapons — swords, axes, spearheads. Armour pieces displayed on wooden stands. Glowing embers and orange forge
    light casting dramatic shadows on stone walls covered in soot. Epic wide-angle establishing shot, dramatic atmospheric
    lighting, highly detailed environmental textures, professional game environment art quality, volumetric lighting, atmospheric
    depth and haze.
  type: shop
  is_safe: true
  district_id: district_stone_ford
  _zone: stone_ford
- id: location_stone_ford_cemetery
  name: Міський Цвинтар
  description: Старовинний цвинтар на околиці Кам'яної Броді. Вночі тут неспокійно — поховані не завжди лежать тихо.
  full_description: Міський цвинтар Кам'яної Броді існує з часів заснування поселення — деякі надгробки настільки старі, що
    написи на них давно стерлися. Удень це просто похмуре місце з іржавими огорожами і перехиленими хрестами, де місцеві ховають
    своїх померлих. Але з настанням темряви ситуація кардинально змінюється. Некромантична енергія, що накопичилася тут за
    сотні років, пробуджує старі кістки. Скелети і привиди виходять із могил, обороняючи свій вічний спокій від непрошених
    гостей. Кажуть, що в найстарішій ділянці цвинтаря похований якийсь темний маг, могила якого досі випромінює зловісне фіолетове
    сяйво.
  lore_en: Stone Ford's cemetery dates to the town's founding, with some headstones worn entirely smooth. By day a gloomy
    but peaceful burial ground. By night, centuries of necromantic energy animate the oldest bones. Skeletons and wraiths
    defend their eternal rest. The oldest section reportedly holds a dark mage whose tomb still glows with faint violet light.
    Not for the faint-hearted.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A dark and eerie
    fantasy cemetery at night under a full moon. Ancient crumbling headstones in various states of decay, tilting at odd angles.
    Wrought-iron fence with rusted spikes enclosing the grounds. Bare twisted leafless trees reaching skeletal branches toward
    a cloudy sky. Cold blue moonlight casting long shadows. Wisps of pale mist drifting between the graves. A faint violet
    glow emanating from a distant mausoleum deep in the cemetery. Atmosphere of dread and the undead lurking just out of sight.
    Epic wide-angle establishing shot, dramatic atmospheric lighting, highly detailed environmental textures, professional
    game environment art quality, volumetric lighting, atmospheric depth and haze.
  type: cemetery
  is_safe: false
  district_id: null
  _zone: stone_ford
- id: location_spider_cave
  name: Печера Великих Павуків
  description: Темна волога печера в лісі, де мешкають велетенські павуки. Стіни вкриті густою павутиною.
  full_description: Печера Великих Павуків — природна система підземних галерей глибоко в лісових нетрях. Вхід прихований
    за водоспадом і оточений густою павутиною. Усередині темно й сиро, хоча стіни деяких галерей вкриті біолюмінесцентними
    грибами, що дають тьмяне блакитне сяйво. Павуки тут виростають до розмірів невеликого коня — їхнє отруте паралізує жертву
    за лічені хвилини. На «стелі» висять коконами загорнуті жертви минулих мандрівників. Кажуть, десь у глибині печери знаходиться
    кладка яєць матері-павука — велетня, якого місцеві жителі бояться більше, ніж будь-якого дракона.
  lore_en: The Spider Cave is a natural gallery system deep in the forest, entrance hidden behind a waterfall and thick webbing.
    Dark and damp inside, lit only by bioluminescent fungi casting a faint blue glow. Giant spiders the size of ponies with
    paralyzing venom dwell here. Cocooned victims hang from the ceiling. Somewhere in the depths lies the egg clutch of the
    Spider Mother, a colossus feared throughout the region.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A vast underground
    spider cave, wide establishing shot from the entrance looking in. Natural cave walls and ceiling covered in thick white
    spider webs and silk cocoons of unknown shapes. Bioluminescent blue-green fungi on the cave walls providing eerie ambient
    light. Dark underground pools on the floor. The silhouettes of enormous spiders visible in the shadows and on the ceiling.
    Cocooned shapes hanging ominously overhead. Atmosphere of claustrophobic dread and venom-soaked darkness. Epic wide-angle
    establishing shot, dramatic atmospheric lighting, highly detailed environmental textures, professional game environment
    art quality, volumetric lighting, atmospheric depth and haze.
  type: cave
  is_safe: false
  district_id: null
  _zone: stone_ford
- id: location_forest_clearing
  name: Лісова Галявина
  description: Стародавня галявина посеред дрімучого лісу. Тут відчувається магія — добра чи зла, залежить від часу доби.
  full_description: Ця галявина не нанесена на жодну відому карту. Місцеві жителі знають про неї, але намагаються обходити
    стороною — особливо в повний місяць. Стародавні кола з каменів свідчать про те, що колись тут проводилися ритуали. Центральний
    камінь вкритий рунами, значення яких втрачене для сучасних учених. Вдень галявина виглядає мирно — світло грає на травах
    і квітах, птахи співають. Але з настанням ночі оживають давні дріади та лісові духи, які ревно охороняють своє священне
    місце від тих, хто прийшов із недобрими намірами.
  lore_en: This ancient clearing appears on no known map. Stone circles suggest old ritual use. The central rune-carved stone's
    meaning is lost to modern scholars. By day the clearing appears peaceful — light plays across wildflowers and birdsong
    fills the air. By night ancient dryads and forest spirits emerge, fiercely protecting this sacred place from those with
    ill intent. Approached with respect, it may offer unexpected aid.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. An ancient forest
    clearing under a full moon, wide establishing shot. A circle of moss-covered standing stones surrounding a central carved
    altar stone. Ancient runes glowing faintly with green-gold light on the stones. Tall old-growth trees forming a perfect
    circular wall around the clearing. Bioluminescent wildflowers and mushrooms dotting the grass. Moonlight streaming down
    into the clearing. Ethereal wisps of light drifting between the stones. Atmosphere of ancient magic and nature's power,
    mysterious and beautiful but potentially dangerous. Epic wide-angle establishing shot, dramatic atmospheric lighting,
    highly detailed environmental textures, professional game environment art quality, volumetric lighting, atmospheric depth
    and haze.
  type: forest
  is_safe: false
  district_id: null
  _zone: stone_ford
- id: location_ruined_keep
  name: Зруйнована Твердиня
  description: Руїни давньої фортеці на узгір'ї. Мури обвалились, але нежить, що охороняє скарби, нікуди не поділась.
  full_description: 'Зруйнована Твердиня стоїть на скелястому узгір''ї вже більше трьох сотень років. Колись це була могутня
    прикордонна фортеця, але після великої битви її залишили напризволяще. Зараз від неї лишилися лише частини потрісканих
    мурів, залишки розвалених веж і поросла мохом брущатка внутрішнього двору. Але не все тут мертве. Стародавня магія, що
    просочилася в камені під час осади, пробудила нежить: скелети вартових досі несуть службу, примари колишніх лицарів блукають
    по залах, а в підвалах, за чутками, залишились скарби останнього коменданта. Сміливці, що приходять за здобиччю, рідко
    повертаються з порожніми руками — якщо повертаються взагалі.'
  lore_en: 'The Ruined Keep has stood on a rocky hilltop for over three centuries, abandoned after a great battle. Cracked
    walls, collapsed towers and moss-covered cobblestones remain. Ancient siege-magic seeps from the stones: skeleton guards
    still walk their posts, phantom knights haunt the halls, and the last commander''s treasury reportedly lies intact in
    the cellars below. Brave looters rarely leave empty-handed — if they leave.'
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. Dramatic ruins
    of a medieval fantasy fortress on a rocky hilltop at twilight. Shattered battlements and crumbling stone towers silhouetted
    against a stormy purple sky. Vines and moss covering every surface. Collapsed inner gate with fallen portcullis. Eerie
    ghostly blue light emanating from within the ruins suggesting undead presence. Storm clouds gathering overhead, lightning
    in the distance. Scattered bones and rusted armour fragments visible on the ground. Atmosphere of gothic menace and abandoned
    grandeur. Ravens circling the highest remaining tower. Epic wide-angle establishing shot, dramatic atmospheric lighting,
    highly detailed environmental textures, professional game environment art quality, volumetric lighting, atmospheric depth
    and haze.
  type: ruins
  is_safe: false
  district_id: null
  _zone: stone_ford
- id: location_mountain_pass
  name: Гірський Перевал
  description: Єдиний прохід через Сірі Гори. Тут панують лютий вітер, крутосхили і банди гірських розбійників.
  full_description: 'Гірський перевал Сірих Гір — вузька стежка між прямовисними скелями, єдиний відомий прохід через цей
    гірський хребет. Тут завжди холодно і вітряно: вихори здіймають сніговий пил навіть влітку, а взимку перевал стає майже
    непрохідним. Шлях вузький — двом возам не розминутися, а ліворуч зяє прірва глибиною в тисячі футів. Гірські розбійники
    добре знають ці місця і влаштовують засідки на купецьких обозах. Є ще й небезпека кам''яних обвалів — старожили кажуть,
    що гори «не люблять чужинців». Але для тих, хто здатен пройти цей шлях, за перевалом відкриваються нові землі і небачені
    можливості.'
  lore_en: The Grey Mountain Pass is a narrow trail between sheer cliffs — the only known crossing of this mountain range.
    Always cold and windy, near-impassable in winter. The path is barely wide enough for a single cart, with a thousand-foot
    drop to the left. Mountain brigands know these trails intimately. Rockslides are common — the locals say the mountains
    do not like strangers. For those who endure, new lands await beyond.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A dramatic high-altitude
    mountain pass between sheer grey cliff faces. A narrow dirt trail barely wide enough for one person carved into the mountainside.
    A terrifying vertical drop on one side plunging into cloud. Snow-capped peaks towering above in all directions. Cold grey
    overcast sky with wind-driven snow flurries. Ice patches and loose scree on the path. Distant silhouettes of watchtowers
    or bandit outposts carved into the rock face. Atmosphere of harsh altitude, danger and the raw power of untamed nature.
    Extreme perspective emphasising the height. Epic wide-angle establishing shot, dramatic atmospheric lighting, highly detailed
    environmental textures, professional game environment art quality, volumetric lighting, atmospheric depth and haze.
  type: mountain
  is_safe: false
  district_id: null
  _zone: stone_ford
- id: location_dark_dungeon
  name: Темниця під Руїнами
  description: Підземна в'язниця під Зруйнованою Твердинею. Сюди не проникає сонячне світло, зате живуть жахи глибин.
  full_description: 'Темниця під Руїнами — лабіринт підземних коридорів і камер, прокопаних ще під час будівництва твердині
    три сотні років тому. Тут тримали найнебезпечніших в''язнів, і кажуть, що деякі з них не пішли навіть після смерті. Камери
    вирубані в живій скелі, стіни вкриті рунами утримання, які давно втратили силу. Коридори петляють і перехрещуються — без
    карти заблукати тут дуже легко. У глибших ярусах живуть потвори, що не бачать сонячного світла від народження: гігантські
    пацюки, тіньові слизні й щось значно страшніше. За чутками, в найглибшому ярусі заточена якась стародавня істота, ув''язнена
    ще в часи першої магічної війни.'
  lore_en: 'The Dark Dungeon is a labyrinth of underground corridors and cells carved when the keep was built three centuries
    ago. It held the most dangerous prisoners — some of whom never truly left after death. Cells cut from living rock, walls
    inscribed with long-faded containment runes. Easy to get lost without a map. Deeper levels host creatures born without
    sunlight: giant rats, shadow slimes, and something far worse. The deepest tier reportedly imprisons an ancient entity
    sealed since the first Mage War.'
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A vast underground
    dungeon corridor stretching into darkness, wide establishing shot. Rough-hewn stone walls and low ceiling with iron torch
    brackets holding guttering flames. Heavy iron cell doors with rusted bars lining the corridor. Ancient carved runes glowing
    faint red on the walls — containment magic long faded. Bone fragments and old chains on the stone floor. Deep oppressive
    shadows beyond the torchlight hiding unknown terrors. The corridor splits and curves, suggesting an endless labyrinthine
    depth. Atmosphere of claustrophobic dread, ancient imprisonment and deep-dungeon horror. Epic wide-angle establishing
    shot, dramatic atmospheric lighting, highly detailed environmental textures, professional game environment art quality,
