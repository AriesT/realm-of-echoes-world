- id: location_gallows_hill
  name: Горб Шибениці
  district_id: district_stone_ford
  description: Похмурий пагорб на краю міста з шибеницею — тут виконують вироки.
  full_description: Пагорб видно з більшості вулиць міста — так і задумано. Стара дубова шибениця стоїть тут вже десятки років.
    Городяни сюди не ходять без потреби — кажуть що вночі тут неспокійно і можна почути кроки у темряві.
  lore_en: The hill is visible from most streets in town — that's intentional. The old oak gallows has stood here for decades.
    Townsfolk don't come here without reason — they say it's restless at night and you can hear footsteps in the darkness.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A bleak hilltop
    with an ancient oak gallows against a stormy sky, ravens perched on the crossbeam, the town visible below, oppressive
    and foreboding.
  type: outdoor
  is_safe: false
  open_hours:
    mode: always
  _zone: stone_ford
- id: location_old_watchtower
  name: Стара Сторожова Вежа
  district_id: district_stone_ford
  description: Стара вежа на північ від міста — звідси видно ліс на кілометри вперед.
  full_description: Вежу збудували ще до міста — тоді тут стояли тільки вартові. Зараз вона офіційно занедбана але міцна.
    З вершини відкривається панорама темного лісу і гір вдалині. Деякі мандрівники кажуть що бачили звідти дивні вогні в нетрях.
  lore_en: The tower was built before the town — back when only sentries stood here. It's officially abandoned now but still
    solid. From the top there's a panoramic view of the dark forest and mountains beyond. Some travellers say they've seen
    strange lights in the thickets from up there.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. An ancient stone
    watchtower on a rocky outcrop north of town, the dark taiga forest stretching to the horizon, a lone figure climbing the
    worn stone steps.
  type: outdoor
  is_safe: true
  open_hours:
    mode: always
  _zone: stone_ford
