- id: location_hunter_lodge
  name: Мисливська Хата
  district_id: district_stone_ford
  description: Мисливський будинок на краю лісу — мисливці збираються тут до виходу.
  full_description: Дерев'яна хата з великим двором де мисливці збираються перед виходом у ліс і повертаються з дичиною. Мисливець
    Ростислав Вовчак тримає тут зброю і навчає Стрільбі і обробці дичини. Також виплачує нагороди за небезпечних звірів що
    тривожать ліс.
  lore_en: A timber lodge with a large yard where hunters gather before heading into the forest and return with game. Hunter
    Rostyslav Vovchak keeps weapons here and teaches Archery and game dressing. Also pays bounties for dangerous animals disturbing
    the forest.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A sturdy timber
