  description: Таємна кімната в підвалі Храму де живе давній оракул.
  full_description: Дорога вниз веде через вузькі кам'яні сходи під Храм Світла. Там у постійному напівтемряві живе Старий
    Орен — оракул чиє походження Жрець Ерік не розкриває. Орен говорить рідко і загадково але його пророцтва завжди збуваються.
    Деякі кажуть що він уже не зовсім живий.
  lore_en: The way down leads through narrow stone stairs beneath the Temple of Light. There in permanent half-darkness lives
    Old Oren — an oracle whose origins Priest Erik never reveals. Oren speaks rarely and cryptically but his prophecies always
    come true. Some say he is no longer entirely alive.
