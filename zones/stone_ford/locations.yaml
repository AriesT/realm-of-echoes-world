- id: location_sawmill
  name: Лісопилка
  district_id: district_stone_ford
  description: Лісопилка на краю міста — тут перетворюють колоди на дошки.
  full_description: На межі міста і лісу стоїть великий навіс де кілька пар робітників розпилюють колоди на дошки. Шум пил
    не вщухає від світанку до смерку. Тут продають дерев'яні матеріали і купують дрова. Також тут можна знайти роботу якщо
    потрібні гроші.
  lore_en: On the edge of town and forest stands a large covered shed where several teams of workers saw logs into planks.
    The sound of saws doesn't stop from dawn to dusk. Sells lumber and buys firewood. Also a place to find work if money is
    needed.
