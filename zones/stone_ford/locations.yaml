    виготовляють меблі, двері, сходи і бочки. У куті стоїть верстат що він власноруч зібрав — найкращий інструмент в місті.
    Продає дерев'яні вироби і приймає замовлення.
  lore_en: A spacious workshop piled with planks, blanks and half-finished goods. Yaroslav and his two apprentices make furniture,
