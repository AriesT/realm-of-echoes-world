- id: location_thieves_alley
  name: Злодійський Провулок
  district_id: district_stone_ford
  description: Темний провулок де проводять час ті хто уникає варти.
  full_description: Офіційно цей провулок називається Вуличкою Коваля — але всі знають його справжнє ім'я. Варта сюди заходить
    лише вдвох. Тут можна знайти відмичку, інформацію яку не продадуть на ринку або найняти людину для справ які не терплять
    голосних питань.
  lore_en: Officially this alley is called Smith's Lane — but everyone knows its real name. The watch only enters in pairs.
    Here you can find lockpicks, information not sold at market, or hire someone for business that tolerates no loud questions.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A dark narrow
    alley between old timber buildings, a single lantern casting orange shadows, a cloaked figure leaning against the wall,
    rats and refuse below.
  type: outdoor
  is_safe: false
  open_hours:
    mode: always
  _zone: stone_ford
- id: location_sewer_entrance
  name: Вхід у Каналізацію
  district_id: district_stone_ford
  description: Чавунна решітка що веде в систему підземних каналів під містом.
  full_description: Решітка схована в затінку за пекарнею — мало хто звертає увагу. Унизу — лабіринт вузьких тунелів, брудна
    вода і темрява. Кажуть що деякі злодії живуть там роками. А в найглибшій частині, куди ніхто не ходить, завелась якась
    нечисть.
  lore_en: The grate is hidden in shadow behind the bakery — few notice it. Below — a labyrinth of narrow tunnels, dirty water
    and darkness. They say some thieves have lived there for years. And in the deepest part where no one goes, something unpleasant
    has taken up residence.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A dark iron grate
    entrance to underground sewers, foul water visible below, torch-lit stone arch, slick moss-covered walls, foreboding descent.
  type: dungeon
  is_safe: false
  open_hours:
    mode: always
  _zone: stone_ford
- id: location_smuggler_hideout
  name: Схованка Контрабандистів
  district_id: district_stone_ford
  description: Підвал під занедбаним складом де зберігають незаконний товар.
  full_description: З вулиці нічого не видно — звичайний занедбаний склад. Але під ним — простора схованка де Кримінальний
    Клан Кам'яної Броді зберігає товар і проводить збори. Вхід тільки для своїх. Якщо вам сюди дозволили зайти — у вас є зв'язки
    або борг.
  lore_en: From the street there's nothing to see — just an ordinary abandoned warehouse. But below — a spacious hideout where
    Stone Ford's Criminal Clan stores goods and holds meetings. Entry for members only. If you were allowed in — you have
    connections or a debt.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A secret underground
    smuggler's hideout, crates and barrels marked with coded symbols, a single lantern, rough men around a table with maps,
    tense atmosphere.
  type: indoor
  is_safe: false
  open_hours:
    mode: always
  _zone: stone_ford
- id: location_residential_east
  name: Східні Житлові Квартали
  district_id: district_stone_ford
  description: Тихі вулиці з одноповерховими будинками — тут живуть прості сім'ї.
  full_description: На схід від Ринкової Площі розкинулися рівні вулиці де стоять невеликі дерев'яні будинки — по одному на
    родину. Городи позаду будинків, курятники і дерев'яні хатки. Вранці тут пахне кашею і свіжими дровами.
  lore_en: East of Market Square lie orderly streets of small timber homes — one per family. Kitchen gardens behind houses,
    chicken coops and woodsheds. In the morning the air smells of porridge and fresh firewood.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A quiet residential
    street of small one-story timber houses, garden plots behind, morning smoke from chimneys, a child playing, domestic and
    peaceful.
  type: outdoor
  is_safe: true
  open_hours:
    mode: always
  _zone: stone_ford
- id: location_residential_west
  name: Західні Житлові Квартали
  district_id: district_stone_ford
  description: Густо заселені вулиці на захід від центру — близько до лісу.
  full_description: Тут вулиці йдуть ближче до лісу — деякі будинки стоять прямо на межі де дерева починаються. Люди тут трохи
    суворіші і обережніші ніж у решті міста. Рясні городи і комори з заготовками на зиму.
  lore_en: Streets here run closer to the forest — some houses stand right at the treeline. People here are a bit sterner
    and more cautious than the rest of town. Abundant kitchen gardens and winter stores.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. Timber houses
    with the dense taiga forest looming close behind, a watchtower visible, garden plots and root cellars, residents going
    about morning routines.
  type: outdoor
  is_safe: true
  open_hours:
    mode: always
  _zone: stone_ford
- id: location_abandoned_house
  name: Занедбаний Будинок
  district_id: district_stone_ford
  description: Старий будинок що стоїть порожнім вже кілька років — темні чутки.
  full_description: Будинок колись належав купцю що зник три роки тому. Сусіди кажуть що вночі звідти чути звуки і бачать
    тьмяне світло у вікнах. Варта перевіряла — нічого не знайшли. Але дехто в місті знає більше ніж каже.
  lore_en: The house once belonged to a merchant who disappeared three years ago. Neighbours say they hear sounds at night
    and see dim light in the windows. The watch checked — found nothing. But some in town know more than they say.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A derelict timber
    house with boarded windows, overgrown garden, one shutter banging in the wind, yellow light flickering through a crack,
    unsettling atmosphere.
  type: indoor
  is_safe: false
  open_hours:
    mode: always
  _zone: stone_ford
- id: location_orphanage
  name: Притулок для Сиріт
  district_id: district_stone_ford
  description: Невеликий притулок де жрець Ерік опікується дітьми без батьків.
  full_description: Маленький але чистий будинок поруч з Храмом де живуть вісім сиріт під наглядом сестри Агати. Жрець Ерік
    фінансує притулок з пожертвувань. Дітей навчають грамоті і ремеслу — за кілька років хтось може стати підмайстром у місцевих
    майстрів.
  lore_en: A small but clean house next to the Temple where eight orphans live under Sister Agata's care. Priest Erik funds
    the shelter from donations. Children are taught literacy and a craft — in a few years some may become apprentices to local
    masters.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A modest clean
    stone building next to a temple, children playing in a small courtyard, a robed woman supervising, flower beds around
    the entrance, peaceful.
