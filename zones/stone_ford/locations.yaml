- id: location_tailor_shop
  name: Кравецька Крамниця
  district_id: district_stone_ford
  description: Майстерня Ліли — пошив одягу і ремонт обладунків.
  full_description: 'Ліла шиє вже тридцять років — від простих сорочок до складних бальних суконь. Але в Кам''яній Броді більшість
    замовлень практичні: теплі штани, плащі від дощу, підбивка для обладунків. Вона також навчає кравецтву тих хто готовий
    вчитись. В крамниці завжди готовий одяг і матеріали.'
  lore_en: 'Lila has been sewing for thirty years — from simple shirts to complex ballgowns. But in Stone Ford most orders
    are practical: warm trousers, rain cloaks, armour padding. She also teaches tailoring to willing students. The shop always
    has ready-made clothing and materials.'
