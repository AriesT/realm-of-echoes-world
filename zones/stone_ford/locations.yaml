  full_description: Декілька дерев'яних помостів і дві лодки — от і вся пристань. Але Гаврик Паромник знає кожен поріг на
    Мутниці і може доставити вас в будь-яке місто що стоїть на річці. Також відмінне місце для рибалки — окуні тут великі.
  lore_en: A few wooden piers and two boats — that's the whole dock. But Havryk the Ferryman knows every rapid on the Muddy
    River and can take you to any town that stands on the river. Also an excellent fishing spot — the perch here are large.
