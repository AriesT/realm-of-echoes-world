- id: location_market_square
  name: Ринкова Площа
  description: Серце торговельного життя Кам'яної Броді. Тут щодня лунають крики торговців і запах спецій.
  full_description: 'Ринкова площа Кам''яної Броді — жвавий центр торговельного та громадського життя міста. По периметру
    площі стоять постійні крамниці й ремісничі майстерні, а в центрі щодня розгортається кольоровий ярмарок. Торговці пропонують
    все: від свіжих продуктів і тканин до рідкісних артефактів і зілля. Міська колодязь посеред площі є місцем зустрічей і
    обміну новинами. Варта патрулює площу цілодобово, тому навіть вночі тут відносно безпечно. Зрідка на площі виступають
    мандрівні актори або оголошуються королівські укази.'
  lore_en: The Market Square of Stone Ford is the lively centre of trade and civic life. Permanent shops and craft workshops
    line the perimeter while daily market stalls fill the centre. Merchants offer everything from fresh produce to rare artefacts.
    The central well serves as a meeting point. Town guard patrols ensure safety even at night.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A grand medieval
    fantasy market square, viewed from a slight elevation. Colourful market stalls with red and blue awnings filling a large
    cobblestone plaza. A central stone well with an iron windlass. Timber-framed guild buildings and shops lining the perimeter,
    decorative banners hanging between them. Busy crowd of merchants, townsfolk and travellers in period fantasy attire. Morning
    light with long shadows. Warm golden tones, sense of commerce and community. Epic wide-angle establishing shot, dramatic
    atmospheric lighting, highly detailed environmental textures, professional game environment art quality, volumetric lighting,
    atmospheric depth and haze.
  type: city
