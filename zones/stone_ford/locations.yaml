- id: location_town_stone_ford
  name: Кам'яна Брідь
  description: Невелике торговельне містечко на перетині шляхів, що виросло навколо давнього кам'яного мосту.
  full_description: Кам'яна Брідь — невелике, але жваве містечко, що виросло навколо давнього кам'яного мосту через річку
    Мутниця. Вузькі бруківчасті вулиці тягнуться між фахверковими будинками, на яких погойдуються різнокольорові вивіски крамниць
    і таверн. Центральна ринкова площа щодня заповнена торговцями, мандрівниками й місцевими жителями. Містечко невелике,
    але затишне — тут можна знайти притулок, поповнити запаси і дізнатися місцеві плітки. Варта міста підтримує порядок, тому
    вуличні злочинці тут рідкість.
  lore_en: Stone Ford is a small but lively trading town that grew around an ancient stone bridge over the Muddy River. Cobblestone
    streets wind between timber-framed buildings with colourful shop signs. The central market square bustles daily with merchants,
    travellers and locals. A safe haven for adventurers beginning their journey.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A bustling medieval
    fantasy trading town at golden hour, viewed from street level. Ancient stone bridge crossing a calm river in the background.
    Cobblestone main street with timber-framed buildings, colourful merchant signs swinging in a gentle breeze, market stalls
    with awnings in reds and blues. Warm late afternoon sunlight casting long shadows. Townsfolk visible in the distance,
    smoke rising from chimneys. Safe and welcoming atmosphere, warm amber and ochre tones. Epic wide-angle establishing shot,
    dramatic atmospheric lighting, highly detailed environmental textures, professional game environment art quality, volumetric
    lighting, atmospheric depth and haze.
  type: town
  is_safe: true
  district_id: district_stone_ford
  _zone: stone_ford
- id: location_forest_road
  name: Лісова Дорога
  description: Небезпечна лісова стежка між Кам'яною Бріддю та глибинами лісу. Тут промишляють розбійники.
  full_description: Лісова дорога — стара торговельна стежка, що петляє між велетенськими деревами темного лісу. Колись вона
    була безпечним маршрутом для купців, але нині тут панують розбійники й дикі звірі. Гілки переплітаються над головою, утворюючи
    темний полог, крізь який майже не проникає сонячне світло. Вовки виходять зі хащів у пошуках здобичі, а очі розбійників
    слідкують за кожним одиноким мандрівником. Лише озброєні групи наважуються йти цією дорогою після заходу сонця.
  lore_en: The Forest Road is an old trade path that winds between massive trees of a dark woodland. Once a safe merchant
    route, it is now dominated by bandits and wild wolves. Branches interlock overhead forming a dark canopy. Only armed groups
    dare travel this road after dusk. Danger lurks behind every shadow.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A dark and ominous
    forest road through ancient old-growth trees, overcast sky filtering dim grey light through a dense canopy. Thick gnarled
    roots crossing the muddy dirt path. Mist drifting low along the ground. Shadows suggesting hidden watchers in the undergrowth.
    Fallen leaves, broken branches, worn wagon ruts. Atmosphere of lurking danger and tension. Cool blue-grey colour palette
    with deep shadows. Epic wide-angle establishing shot, dramatic atmospheric lighting, highly detailed environmental textures,
    professional game environment art quality, volumetric lighting, atmospheric depth and haze.
  type: wilderness
  is_safe: false
  district_id: district_stone_ford
  _zone: stone_ford
- id: location_town_tavern
  name: Таверна «Сонний Дракон»
  description: Затишна таверна в серці Кам'яної Броді. Тут завжди тепло, шумно і пахне смаженим м'ясом.
  full_description: «Сонний Дракон» — найпопулярніше місце в Кам'яній Броді. Масивні дерев'яні балки підпирають стелю, біля
    каміна завжди гуде жаровня, а на стінах висять голови трофеїв і старі карти невідомих земель. Товстий господар Малдус
    тримає порядок залізною рукою у оксамитовій рукавичці — бійок тут майже не буває. Місцеве пиво вважається найкращим у
    всьому окрузі, а пироги з дичиною прославились на все торговельне узбережжя. Мандрівники з усіх куточків світу приносять
    сюди свої новини, чутки й пригоди.
  lore_en: The Sleeping Dragon is the most popular establishment in Stone Ford. Heavy oak beams support the low ceiling, a
    roaring fireplace dominates one wall. The proprietor Maldus keeps firm but fair order. Local ale is celebrated across
    the region. Travellers from every corner bring news, rumours and tall tales. A true adventurer's hub.
  image_prompt: Photorealistic landscape digital painting, cinematic fantasy MMORPG environment concept art. A warm and cosy
    fantasy tavern interior, wide establishing shot. Heavy exposed timber beams overhead, large stone fireplace on the far
    wall with a crackling fire casting orange light. Rough-hewn wooden tables and benches, mugs of ale, candles in iron holders.
    Hanging dried herbs and hunting trophies on dark wooden walls. Patrons in period fantasy attire drinking and talking.
    Warm amber lighting creating a welcoming glow. Smoke haze near the ceiling. Epic wide-angle establishing shot, dramatic
    atmospheric lighting, highly detailed environmental textures, professional game environment art quality, volumetric lighting,
