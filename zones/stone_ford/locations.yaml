  district_id: district_stone_ford
  description: Пекарня Мирони — запах свіжого хліба відчутний на всю Ремісничу Вулицю.
  full_description: Мирона прокидається о четвертій ранку щоб встигнути спекти перші паляниці до відкриття. О восьмій ранку
    вже черга — хліб розходиться швидко. Окрім хліба продає пироги, медяники і вівсяні коржі. Є чутки що вона кладе в тісто
    щось особливе — хліб не черствіє три дні.
  lore_en: Myrona wakes at four in the morning to bake the first loaves before opening. By eight there's already a queue —
    bread sells fast. Besides bread she sells pies, gingerbread and oat cakes. Rumour says she puts something special in the
