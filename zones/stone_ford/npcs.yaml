  _zone: stone_ford
- id: npc_guard_patrol_bors
  name: Вартовий Борс
  title: Патрульний вартовий
  description: Підозрілий та пильний патрульний, що перевіряє всіх незнайомців, які входять до міста.
  full_description: Борс — пересічний міський вартовий із десятирічним стажем, якого давно охопила службова підозрілість.
    Він бачив достатньо злочинців, що приховувалися за дружелюбним обличчям, щоб більше не довіряти незнайомцям. Борс суворо
    дотримується правил і майже не відступає від них — чи то перевірка документів, чи то заборона проносити зброю без дозволу.
    Він не жорстокий і не хабарник, просто людина, яка вважає, що правила існують не дарма. До постійних жителів міста він
    ставиться з відкритою доброзичливістю, і навіть може пожартувати в спокійну ніч. Але з чужинцями — тільки офіційно та
    з рукою на руків'ї меча.
  lore_en: Bors is an ordinary city guard with ten years of service, long since hardened into professional suspicion. He has
    seen enough criminals hiding behind friendly faces to stop trusting strangers. Bors strictly follows the rules and rarely
    deviates — document checks, weapon permits, curfew enforcement. He is not cruel or corrupt, simply a man who believes
    rules exist for a reason. With city residents he can be warm and even jokes on a quiet night. But with strangers — strictly
    official, one hand always near his sword hilt.
  image_prompt: 'Digital painting, fantasy concept art, MMORPG character illustration, full body portrait, artstation trending, painterly style, detailed fantasy illustration, cinematic composition, vibrant colors, stylized realism. A stocky man in his
    early forties with a square jaw and watchful brown eyes that constantly scan for threats. He wears standard city watch
    armor — chainmail under a tabard in the city colors of dark blue and grey, with a simple iron pauldron. A short sword
    hangs at his hip and a hand-crossbow is clipped to his belt. His posture is alert and guarded, weight slightly forward,
    hand resting on his sword pommel. His expression conveys the practiced skepticism of someone who checks documents for
    a living and has been lied to many times. The city gate or stone archway is visible behind him. Character lore: Bors is
    the suspicious patrol guard who checks everyone entering the city, professional and rules-focused after ten years of service
    catching criminals hiding behind smiles. Detailed worn armor with realistic metal textures, cool evening torch lighting,
    professional character art quality.'
  avatar_url: null
  type: guard
  is_hostile: false
  is_teacher: false
  _zone: stone_ford
- id: npc_elder_councilor_edwin
  name: Радник Едвін
  title: Старший Радник міста
  description: Мудрий і стомлений старець, що управляє містом і дає важливі доручення гідним авантюристам.
  full_description: 'Едвін Сіроплащевий — найстарший член Міської Ради та головний радник Лорда-Правителя. Йому вже сімдесят
    два роки, з яких понад п''ятдесят він провів на службі місту. Він пережив чотирьох правителів, дві облоги та одну чуму.
    Його пам''ять — це жива хроніка міста: він пам''ятає давно забуті угоди, старі родинні образи та таємниці, що могли б
    зруйнувати не одну сім''ю. Едвін рідко виходить із Ратуші — нестійкі коліна вже не ті. Але його вплив відчувається в кожному
    рішенні. Він не подарує доручення першому-ліпшому: спочатку він оцінить претендента дуже прискіпливо, перш ніж довірити
    справи міста.'
  lore_en: Edwin Greymantle is the eldest member of the City Council and chief advisor to the Lord-Ruler. At seventy-two he
    has served the city for over fifty years, surviving four rulers, two sieges, and one plague. His memory is a living chronicle
    of the city — forgotten treaties, old family grievances, secrets that could destroy dynasties. Edwin rarely leaves the
    Town Hall, his knees no longer reliable, but his influence is felt in every decision made. He does not give quests to
    just anyone — he evaluates every candidate with sharp scrutiny before entrusting city affairs.
  image_prompt: 'Digital painting, fantasy concept art, MMORPG character illustration, full body portrait, artstation trending, painterly style, detailed fantasy illustration, cinematic composition, vibrant colors, stylized realism. An elderly man in
    his early seventies with sharp, clear blue eyes that belie his age — eyes that have seen everything and forgotten nothing.
    His white hair is thin but neatly combed, and a distinguished grey-white goatee is trimmed short. He wears formal council
    robes in deep charcoal grey with silver trim, a thick woolen cape over his shoulders, and a council medallion at his chest.
    He leans slightly on an ornate wooden walking staff. His expression is measured, calculating, and patient — the look of
    someone who has outlasted many crises through careful thought. The council chamber or library is visible behind him with
    tall bookshelves and candlelit scrolls. Character lore: Elder Councilor Edwin has served the city for fifty years through
    sieges and plagues, his memory a living chronicle and his trust earned only by the truly worthy. Detailed formal clothing
    with realistic fabric drape, warm candlelight with book-lined background, professional character art quality.'
  avatar_url: null
  type: quest
  is_hostile: false
  is_teacher: false
  _zone: stone_ford
- id: npc_stable_master_olrik
  name: Ольрік
  title: Конюший
  description: Спокійний та надійний конюший, що займається кіньми та організовує транспорт для мандрівників.
  full_description: 'Ольрік — людина небагатьох слів і великої справи. Він доглядає за міськими стайнями вже шістнадцять років
    і знає кожного коня в місті на ім''я. Говорять, що він краще спілкується з кіньми, ніж із людьми — і самі коні, мабуть,
    погодились би. Ольрік організовує транспортування вантажів і пасажирів по торговельних шляхах, знаходить надійних візників
    і може оцінити коня з першого погляду. Чесний у торгівлі, скупий на слова, але відданий своїй справі. Якщо ваш кінь кульгає
    — несіть до Ольріка: він вилікує або скаже чесно, якщо це вже неможливо.'
  lore_en: Olrik is a man of few words and great competence. He has managed the city stables for sixteen years and knows every
    horse in the city by name. He communicates better with horses than people — and the horses would likely agree. He organizes
    cargo and passenger transport along the trade routes, finds reliable drivers, and can evaluate a horse in seconds. Honest
    in trade, sparing with words, utterly devoted to his work. If your horse limps, bring it to Olrik — he will heal it or
    tell you honestly if the situation is beyond help.
  image_prompt: 'Digital painting, fantasy concept art, MMORPG character illustration, full body portrait, artstation trending, painterly style, detailed fantasy illustration, cinematic composition, vibrant colors, stylized realism. A lean, wiry man
    in his mid-forties with sun-darkened skin and the quiet ease of someone completely at home outdoors. He wears practical
    stable clothes — sturdy canvas breeches, a worn leather vest over a simple linen shirt, and sturdy boots caked with honest
    mud. His dark brown hair is cut short and his hands show the knobbed knuckles of someone who works with horses every day.
    He stands relaxed, one hand resting on a stable post, an expression of quiet, unhurried competence on his face. A well-groomed
    horse is partially visible behind him in a straw-filled stable with warm lantern light. Character lore: Olrik the stable
    master has cared for the city''s horses for sixteen years, a man more comfortable with animals than people and known throughout
    the region as the best judge of horseflesh for a hundred miles. Detailed worn work clothing with realistic leather texture,
    warm stable lantern lighting, professional character art quality.'
  avatar_url: null
  type: generic
  is_hostile: false
  is_teacher: false
  _zone: stone_ford
- id: npc_alchemist_vex
  name: Алхімік Векс
  title: Алхімік-чарівник
  description: Ексцентричний алхімік, що продає зілля та реагенти у своїй яскраво-фіолетовій крамниці.
  full_description: 'Векс — дивакуватий геній алхімії, що з''явився в місті невідомо звідки приблизно п''ять років тому і
    відкрив свою крамницю ''Бурлячі бульбашки'' без жодних пояснень. Його зілля справді діють — іноді краще, ніж очікувалося,
    а іноді зовсім не так, як планувалося. Він одночасно балакучий та загадковий: може годинами розповідати про властивості
    драконячої жовчі, але ніколи не відповість, звідки він родом. Векс носить фіолетовий каптан, забризканий різнокольоровими
    плямами від реагентів, і захисні окуляри, що він рідко знімає. Його вуса завжди трохи підпалені з лівого боку — наслідок
    нещодавнього ''дрібного непорозуміння'' в лабораторії.'
  lore_en: 'Vex is an eccentric alchemical genius who appeared in the city about five years ago from nowhere and opened his
    shop ''Bubbling Bubbles'' without explanation. His potions genuinely work — sometimes better than expected, sometimes
    in unexpected ways. He is simultaneously chatty and mysterious: he can talk for hours about the properties of dragon bile
    but will never answer where he is from. Vex wears a purple coat splattered with multicolored reagent stains and protective
    goggles he rarely removes. His mustache is always slightly singed on the left side — residue from a recent ''minor laboratory
    misunderstanding''.'
  image_prompt: 'Digital painting, fantasy concept art, MMORPG character illustration, full body portrait, artstation trending, painterly style, detailed fantasy illustration, cinematic composition, vibrant colors, stylized realism. A wiry, energetic
    man of indeterminate age — could be thirty-five or sixty — with wild grey-streaked dark hair that seems permanently disheveled.
    He wears a flamboyant purple alchemist''s coat covered in multicolored stains and burn marks, with numerous small pockets
    bulging with vials. A pair of thick protective brass goggles sits on his forehead, and his mustache is visibly singed
    on one side. His eyes are bright with manic curiosity and his expression is delighted — the look of someone always on
    the verge of discovering something wonderful or blowing something up. He gestures enthusiastically with a bubbling flask
