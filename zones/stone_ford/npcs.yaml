- id: npc_merchant_torben
  name: Торбен
  title: Мандрівний торговець
  description: Огрядний чоловік із хитрими очима. Завжди знає, де купити дешевше і продати дорожче.
  full_description: 'Торбен — найвідоміший торговець у місті, що веде своє походження від купецького роду Торбенів із Вільного
    Порту. Його крамниця на Ринковій площі — справжня скарбниця: від звичайних ліків і їжі до рідкісних магічних інгредієнтів
    та екзотичних товарів з далеких країв. Торбен — людина слова, хоча й не завжди дотримується найнижчих цін. Він стверджує,
    що ''якість коштує своїх грошей'' і щиро в це вірить. У молодості він мандрував торговельними шляхами, тому має правдиві
    байки про кожен товар — чи то рідкісний камінь, чи то закордонна пряність. Заможний, але не зажерливий — Торбен регулярно
    жертвує на утримання міської каплиці.'
  lore_en: 'Torben is the city''s most established merchant, from the trading dynasty of Torbens of Free Port. His shop on
    Market Square is a genuine treasure trove: from everyday medicines and food to rare magical ingredients and exotic goods
    from distant lands. Torben is a man of his word, though not always the cheapest option. He firmly believes quality is
    worth its price. In his youth he traveled the trade routes and has authentic stories about every item he sells. Wealthy
    but not greedy — he regularly donates to maintain the city chapel.'
  image_prompt: 'Digital painting, fantasy concept art, MMORPG character illustration, full body portrait, artstation trending, painterly style, detailed fantasy illustration, cinematic composition, vibrant colors, stylized realism. A prosperous middle-aged
    man in his late forties with the comfortable confidence of a successful merchant. He wears layered traveling clothes in
    warm earth tones — a fine wool coat over a embroidered vest, with numerous practical pockets and a coin purse at his belt.
    His dark beard is neatly trimmed and his brown eyes are warm but sharp with merchant''s acuity. He gestures with one hand
    as if describing his wares, with a pack bundle and sample cases visible behind him. His shop background shows shelves
    crowded with bottles, exotic trinkets, and rolled maps. Character lore: Torben comes from a renowned merchant dynasty,
    having traveled trade routes in his youth and accumulated stories for every item in his legendary shop. Detailed fabric
    and leather textures, warm shop lighting with candles and lanterns, professional character art quality.'
  avatar_url: /static/avatars/npcs/npc_merchant_torben.webp
  type: merchant
  is_hostile: false
  is_teacher: false
  _zone: stone_ford
- id: npc_blacksmith_helga
  name: Гельга
  title: Ковалиха
  description: Висока жінка з мозолястими руками. Кує зброю та лати вже двадцять років.
  full_description: 'Гельга — майстер-коваль із грубими руками та незламною вдачею. Виросла у сім''ї ковалів на північ від
    Залізного Перевалу, вона успадкувала ковальню від свого батька Брюнора після того, як він загинув у битві з гоблінами.
    Двадцять років Гельга кує зброю та обладунки для мандрівників і солдат. Її роботи відомі своєю надійністю — жодна клинок
    з її кузні ще не зламався у бою. Жінка суворої вдачі, але справедлива: вона ніколи не обдурить чесного клієнта. Вночі,
    коли кузня вже не димить, вона грає на старій бандурі й тихо співає балади загиблих.'
  lore_en: Helga is a master blacksmith with calloused hands and an iron will. Born to a family of smiths near Iron Pass,
    she inherited the forge from her father Brunor who fell in battle. For twenty years she has forged weapons and armor for
    travelers and soldiers. Her work is known for reliability — no blade from her forge has ever broken in combat. Strict
    but fair, she is a woman of few words and great craftsmanship. At night she plays an old bandura and sings softly to herself.
  image_prompt: 'Digital painting, fantasy concept art, MMORPG character illustration, full body portrait, artstation trending, painterly style, detailed fantasy illustration, cinematic composition, vibrant colors, stylized realism. A stout dwarven-looking
    female blacksmith in her late forties, powerfully built with broad shoulders and muscular arms covered in small burn scars
    and callouses. She wears a heavy leather apron stained with soot and oil over a reinforced linen work shirt with rolled
    sleeves. Her silver-streaked auburn hair is pulled back in a practical braid. Her expression is stern but carries quiet
    pride — the look of someone who has spent decades mastering their craft. She holds a large smithing hammer resting on
    her shoulder with easy familiarity. Behind her, glowing forge coals cast warm amber and orange light, illuminating the
    hanging tools and half-finished sword blades on the rack. Character lore: Helga is a master blacksmith who inherited the
    forge from her fallen father. Twenty years of forging legendary blades has left its mark on her face and hands. Detailed
    costume textures with realistic leather grain and metal rivets, expressive weathered face, professional character art
    quality, warm forge lighting with dramatic rim light.'
  avatar_url: /static/avatars/npcs/npc_blacksmith_helga.webp
  type: blacksmith
  is_hostile: false
  is_teacher: false
  _zone: stone_ford
- id: npc_innkeeper_gronda
  name: Гронда
  title: Господиня таверни
  description: Повнотіла жінка з гучним голосом і добрим серцем. Подає найкращий ель у всьому районі.
  full_description: 'Гронда — господиня таверни ''Відьмин казан'', що стоїть у серці міста вже понад тридцять років. Говорять,
    що вона прийшла до міста молодою дівчиною зі Східних боліт, рятуючись від якоїсь темної тайни. Якою б не була її минула,
    зараз вона — незмінна частина міського пейзажу. Гронда знає всіх і все — хто з ким спить, хто кому винен, де заховані
    секрети. Її кухня творить дива: гостинничне рагу з редькою та свинячими реберцями відомо на всю округу. За чаркою старого
    вина вона може розповісти таємниці міста або відмовчатися — залежно від того, чи подобається їй ваше обличчя.'
  lore_en: 'Gronda has run the Witch''s Cauldron inn for over thirty years. She arrived in the city as a young woman from
    the Eastern Marshes, fleeing some dark secret she never shares. Whatever her past, she is now an immovable fixture of
    city life. Gronda knows everyone and everything — who owes whom, where secrets are buried. Her cooking is legendary: the
    inn stew with turnip and pork ribs is famous throughout the region. Over a cup of old wine she may share the city''s secrets
    or stay silent, depending on whether she likes the look of you.'
  image_prompt: 'Digital painting, fantasy concept art, MMORPG character illustration, full body portrait, artstation trending, painterly style, detailed fantasy illustration, cinematic composition, vibrant colors, stylized realism. A broad, confident
    woman in her late fifties with an innkeeper''s presence that fills the room. She has thick dark hair streaked with grey,
    tied loosely with a colorful cloth. Her face is round and expressive — laugh lines around shrewd dark eyes that miss nothing.
    She wears a sturdy woolen dress in deep burgundy with a flour-dusted apron tied at the waist, sleeves rolled up to show
    capable forearms. She leans against the inn bar with comfortable authority, a clay mug in one hand and a ledger tucked
    under her arm. The warm tavern behind her shows rough-hewn wood, hanging lanterns, and the faint glow of a hearth fire.
    Character lore: Gronda is the legendary innkeeper of the Witch''s Cauldron, keeper of secrets and maker of the finest
    stew in the region, with a mysterious past she never discusses. Detailed fabric textures and realistic skin, warm tavern
    fire lighting, professional character art quality.'
  avatar_url: /static/avatars/npcs/npc_innkeeper_gronda.webp
