    але після них — першим пропонує руку тому, кого щойно розкидав по піску.'
  lore_en: 'The Arena Master is a person without a past — or at least one they are willing to discuss. He arrived in the city
    ten years ago with empty hands and a broken nose, and within a month was running the old abandoned arena, turning it into
    a thriving combat club. He never explains where he learned to fight, but the results speak for themselves — everyone who
    completes his training becomes a noticeably better fighter. He respects genuine dedication and is intolerant of arrogance.
    He likes to say: ''The arena does not lie. It always shows who you truly are.'' In training he is merciless, but afterward
    is the first to offer a hand to someone he just knocked into the sand.'
