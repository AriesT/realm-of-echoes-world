  _zone: stone_ford
- id: npc_guard_captain
  name: Капітан Ворен
  title: Капітан варти
  description: Сувора людина з рубцем на щоці. Стежить за порядком у місті залізною рукою.
  full_description: Капітан Ворен — досвідчений ветеран міської варти, що вже два десятки років охороняє спокій Відлуння.
    Молодим він воював у Великій Прикордонній кампанії, де отримав шрам через ліву щоку від орка-берсерка. Ворен — людина
    порядку та дисципліни. Він береже місто не зі страху чи алчності, а з переконання, що порядок — це єдине, що відділяє
    цивілізацію від хаосу. До молодих авантюристів він ставиться з обережним скептицизмом, але готовий навчити тих, хто доводить
    свою серйозність. Його уроки з фехтування та тактики — суворі, але дієві.
  lore_en: Captain Voren is a seasoned veteran of the city watch, guarding Echoes for over two decades. In his youth he fought
    in the Great Border Campaign and received his iconic scar from an orc berserker. He maintains order not from fear or greed,
    but from genuine belief that discipline is the only barrier between civilization and chaos. He views young adventurers
    with cautious skepticism but is willing to teach those who prove their seriousness. His lessons in swordplay and tactics
    are harsh but effective.
  image_prompt: 'Digital painting, fantasy concept art, MMORPG character illustration, full body portrait, artstation trending, painterly style, detailed fantasy illustration, cinematic composition, vibrant colors, stylized realism. A tall, lean man
    in his mid-fifties with the bearing of a career soldier. He wears polished city watch plate armor in deep navy blue and
    silver, with a captain''s insignia on his pauldron. A distinctive jagged scar runs from his left cheekbone to his jaw.
    His short salt-and-pepper hair is neatly cropped and his grey eyes are sharp and calculating. He stands in a parade-rest
    stance with one gauntleted hand resting on the pommel of his longsword. His expression conveys authority and quiet vigilance
    — a man who has seen real battle and carries that weight with practiced calm. Character lore: Captain Voren is the experienced
    commander of the city guard, a veteran of the Great Border Campaign with decades of service and a scar to prove it. Detailed
    armor with scratches showing real use, expressive weathered military face, professional character art quality, cool torchlight
    with subtle blue ambient from stone walls.'
  avatar_url: /static/avatars/npcs/npc_guard_captain.webp
  type: guard
  is_hostile: false
  is_teacher: false
  _zone: stone_ford
- id: npc_healer_sister_mira
  name: Сестра Міра
  title: Цілителька
  description: Тиха та добра сестра-цілителька, що веде місцевий лазарет і лікує поранених за помірну плату.
  full_description: Сестра Міра присвятила своє життя служінню Богині Зцілення — Ліані Лагідній. Вже дванадцять років вона
    веде міський лазарет, розташований у давній каплиці на краю Ремісничого кварталу. Вона лікує всіх — від прочан з порізами
    до солдат зі стрілами в грудях. Обличчя Міри незмінно спокійне, але очі видають втому — надто багато болю пройшло крізь
    її руки. Вона ніколи не відмовляє тим, хто не може заплатити, але приймає продукти чи допомогу замість монет. Її трав'яні
    відвари та зілля відновлення — найефективніші в окрузі. Говорять, що в особливо важкі ночі вона молиться до ранку, не
    смикаючи з рани.
  lore_en: Sister Mira has dedicated her life to the Goddess of Healing, Liana the Gentle. For twelve years she has run the
    city infirmary in an ancient chapel at the edge of the Crafters Quarter. She heals all who come to her — pilgrims with
    cuts to soldiers with arrows in their chests. Her face is perpetually calm but her eyes show deep exhaustion from years
    of witnessing suffering. She never refuses those who cannot pay, accepting food or labor in lieu of coin. Her herbal remedies
    and restoration potions are the most effective in the region.
  image_prompt: 'Digital painting, fantasy concept art, MMORPG character illustration, full body portrait, artstation trending, painterly style, detailed fantasy illustration, cinematic composition, vibrant colors, stylized realism. A slender woman in
    her late thirties with a gentle but tired face, kind grey eyes with faint dark circles beneath them. She wears clean white
    and pale blue healer''s robes with a silver symbol of a healing goddess embroidered on the chest. Multiple small leather
    pouches filled with medicinal herbs hang from her belt alongside a vial of softly glowing healing potion. Her light brown
    hair is pulled back in a neat braid under a simple white cloth. She holds a mortar and pestle in one hand while her other
    rests on a bandaged patient''s arm in a comforting gesture. Character lore: Sister Mira is the dedicated healer of the
    city infirmary, exhausted but unwavering in her devotion to healing all who come to her regardless of ability to pay.
    Detailed fabric textures with clean white linen, soft cool healing light with warm candle accent, professional character
    art quality.'
  avatar_url: null
